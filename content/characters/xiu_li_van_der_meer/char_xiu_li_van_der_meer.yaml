name: Xiu Li van der Meer Krol
title: Councilwoman; Head of Van der Meer Mining Operations
description: |
  Xiu Li van der Meer Krol is a councilwoman and head of Van der Meer Mining Operations. Born in Las Flores to a Dutch father and Chinese mother, she represents the intersection of the city's dual heritage. Married to Hans Krol; her half-brother is Liam van der Meer, executive at Van der Meer Industries.
