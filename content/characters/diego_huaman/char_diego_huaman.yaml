name: Diego Huamán
title: Environmental Science Student and Community Advocate
description: |
  Diego Huamán is a 19-year-old Environmental Science major at the university in Central Las Flores. He grew up in a small Andean village where his family farms potatoes, quinoa, and raises llamas. His parents instilled hard work and education as the path forward.

  Diego's athletic build comes from years of hiking mountain trails and working the family farm. He carries a handwoven mochila. Despite adapting to city life—with new friendships and financial challenges from part-time café work—he remains deeply connected to his Andean heritage through music and cultural events, and plays the charango.

  His studies focus on sustainable agriculture. He dreams of returning to his village to establish a cooperative that promotes eco-friendly farming while preserving ancestral knowledge.
