name: Lucas van der Meer
title: Youngest Son of the van der Meer Family
description: |
  Lucas van der Meer, 31, younger son of the van der Meer lithium mining dynasty. Raised with siblings Peter and Anna, he struggled with inadequacy and turned to drugs. Embezzled from family business (2065), arrested, forced into rehab. Later diagnosed with schizoaffective disorder (2077), committed to psychiatric institution (2081). He seeks sobriety and reconciliation with his family.
