description: "Camila Reyes (19). Camila hails from Bahía de las Olas, a picturesque coastal village known for its stunning beaches and vibrant fishing community. Growing up by the ocean, she developed a deep appreciation for the sea and the cultural richness of her hometown. Camila is the first in her family to attend university, driven by her desire to create opportunities for herself and her community. Camila is adventurous, passionate, and sociable."
