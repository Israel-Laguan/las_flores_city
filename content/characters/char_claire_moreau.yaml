name: "Claire Moreau"
title: "Spiritual Yogini and Hostess by the Port"
description: |
  Claire Moreau is a captivating 45-year-old French woman with a deep love for the ocean and spirituality. Raised in an artistic coastal household, she transformed profound loss—the death of her French captain husband in a storm—into a life of freedom and connection, supported by life insurance he left behind. Openly bisexual, she draws university students and young professionals into her orbit, valuing meaningful bonds while exploring flirtatious and adventurous relationships. Deeply spiritual, she practices daily meditation and hosts dawn yoga sessions, often followed by lavish bohemian gatherings at her seaside home near the port. Charismatic and empathetic, Claire creates a welcoming space for people to explore their free spirits.
