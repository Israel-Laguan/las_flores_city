name: "Camila Santander"
title: "Tourism Company Owner, Outdoor Adventure Guide"
description: |
  Camila Santander is a 32-year-old tourism entrepreneur and outdoor adventure guide based in Las Flores. Her athletic build, sun-kissed skin, and long dark hair reflect her Hispanic heritage and active lifestyle. She runs a tourism company offering one-day and multi-day trips to the mountains, Agricultural Valley, river, and beach.
  
  Having witnessed the Great Lithium Leakage's impact on her community, Camila values resilience and adaptability. She personally accompanies tour groups and meticulously plans itineraries to ensure safe, memorable experiences. Behind her friendly exterior is a shrewd businesswoman determined to rebuild tourism through exceptional service and customer loyalty.
  
  Camila is building a small rural lodge to offer immersive countryside experiences. Despite her success, she struggles with work-life balance—her workaholic tendencies make romance challenging, though she longs for a meaningful relationship.
