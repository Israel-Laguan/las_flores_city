name: Willem van der Meer
title: European Businessman, Van der Meer Family (Rotterdam Branch)
description: Willem van der Meer is the son of Pieter van der Meer's brother Hendrik, making him first cousin to Elisabeth, Alexander, and Jan. Born and raised in Europe, he maintained close ties with the Las Flores branch of the family. In his youth, he had a brief romantic relationship with his cousin Elisabeth before she married Carlos Alberto Hernandez — a connection that led to confusion in later family records. Willem built a successful import-export business in Rotterdam, occasionally visiting Las Flores for family events and business partnerships with GLC. He is the father of Nico van der Meer.
