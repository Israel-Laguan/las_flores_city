description: A lean student with neon-green streaks in her dark hair and cybernetic ocular implants that flicker with data streams, Valentina Cruz moves through the university halls like a ghost in the system—spreading rumors and sabotaging competitors with methodical precision. Her rivalry knows no bounds, whether it's academic sabotage or corporate espionage, making her a dangerous peer to those who cross her path in the neon-soaked corridors of power.
