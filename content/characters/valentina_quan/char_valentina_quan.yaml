name: Valentina Quan
title: Flight Attendant, Aeropuerto Internacional de Las Flores
description: |
  A 25-year-old flight attendant of multicultural heritage, fluent in English, Chinese, and Dutch.
  Raised in a diverse environment, she pursued a career as an azafata at Aeropuerto Internacional
  de Las Flores, travelling the world and connecting with people across cultures. On the surface she
  is charming and vivacious; beneath it she battles depression, a persistent sense of emptiness, and
  a pattern of fleeting romances that offer only temporary relief. She dreams of retraining as a
  psychologist or counsellor so she can help others who carry the same silent struggles she does.
