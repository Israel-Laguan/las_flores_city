name: Carlos Mendoza
title: Retired Minera Estrella Engineer
description: A retired engineer who worked at Minera Estrella during the 2052 lithium leak, Carlos Mendoza quietly provided crucial technical information to the 2077 investigators about the structural failures at the processing facility. He was not among the building owners at Residencial Las Estrellas, but his knowledge of the pipe systems and containment failures helped prove the cover-up. He lived in fear of retaliation for decades, and only came forward when it became clear the movement had the strength to protect him.
