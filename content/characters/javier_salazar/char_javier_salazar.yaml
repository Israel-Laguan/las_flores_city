name: Javier Salazar
title: Far South Police Helicopter Pilot
description: |
  Javier "Javi" Salazar is a 35-year-old police helicopter pilot assigned to the Far South region of Las Flores. Originally from Central Las Flores, he grew up enjoying the city's vibrant nightlife and social scene, but his remote posting leaves him discontent and yearning for the excitement of home.

  Javi cultivates a flashy ladies' man image — knock-off luxury brands, fake designer watches, styled dark hair, and a charming smile. He enjoys flirting, but his reputation for unfaithfulness makes local women view him with skepticism. Beneath the bravado, he struggles with disappointment about his isolation and limited social scene, seeking out drinking and dancing to enliven his mundane duties.

  As a police helicopter pilot, he takes pride in his skills combating smugglers, thriving on adrenaline and exaggerating danger to impress others. In his free time, he enjoys restaurants, bars, live music, dancing, and embellishing tales of his escapades to entertain his peers.
