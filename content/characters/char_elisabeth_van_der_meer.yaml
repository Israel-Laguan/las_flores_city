name: Elisabeth van der Meer
title: Socialite, Art Collector, and Philanthropist
description: |
  Born into the prominent van der Meer family in Europe during the 2020s, Elisabeth married Carlos Alberto Hernandez in 2038 after meeting him at a society event when she was 18. When her father Pieter expanded family mining interests into Las Flores, the entire van der Meer clan relocated to the region.

  Elisabeth quickly became a pillar of Las Flores high society, hosting lavish parties at her riverbank estate and building one of the region's most extensive collections of Shipibo-Konibo art. She serves on boards of education, healthcare, and women's empowerment organizations, using her influence to advocate for marginalized communities. Despite public scrutiny surrounding her ex-husband's business dealings, she remains devoted to raising her daughter Sophia and supporting causes that improve residents' lives.
