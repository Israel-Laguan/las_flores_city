name: "Elisabeth van der Meer"
title: "Political Figure"
description: "A Dutch Van der Meer who married Carlos Alberto Hernandez in 2038. Trapped between her family's integrity, her husband's corruption, and her own desire for comfort, she navigates the treacherous waters of Las Flores politics. Elisabeth was born into the prominent van der Meer family in Europe during the 2020s. She met her husband at a society event when she was just 18 years old. When Elisabeth's father-in-law decided to expand the family's mining interests into Las Flores, the entire van der Meer clan, including Elisabeth and her immediate family, moved to the region."
