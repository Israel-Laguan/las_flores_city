name: "Nico van der Meer"
title: "European Business Heir, Van der Meer Family Member"
description: "Nico van der Meer is the son of Alexander van der Meer Jr., part of the European branch of the van der Meer family. Born and raised in Rotterdam, he grew up hearing stories of the Las Flores lithium boom and the family's South American adventures. In his twenties, Nico moved to Las Flores to help manage the family's import-export operations between Europe and South America. A sharp, ambitious businessman, Nico navigates the complex dynamics between the legitimate van der Meer enterprises and his cousin Dong's shadowy Flowers Syndicate operations. He maintains a cordial but cautious relationship with the Las Flores branch, aware that his father's past romantic history with Elisabeth adds an undercurrent of tension to family gatherings."
