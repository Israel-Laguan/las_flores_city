name: "Alex Garcia"
title: "Architecture Student, Van der Meer Scholar, Leader of the 2077 Grassroots Movement"
description: "The central protagonist of the 2077 endgame arc. Born in a coastal town south of Las Flores, Alex grew up knowing the cost of corporate greed intimately — their mother Rosa died from respiratory complications caused by lithium-contaminated groundwater. Alex enrolled at Universidad Nacional de Las Flores in 2075 to study sustainable urban design on a Van der Meer Foundation scholarship. After moving into Residencial Las Estrellas, Alex noticed a pattern of suspicious deaths and began investigating, eventually discovering Evelyn Ruthenberg's vigilante campaign. The revelation that Evelyn was targeting the people responsible for the contamination that killed their mother transformed Alex's grief into directed action. Alex built a grassroots movement that brought the fight into the light, and died in 2077 detonating an abandoned mine to create an improvised dam — saving the city from a catastrophic flood and buying Evelyn and the others the cover they needed to escape."
