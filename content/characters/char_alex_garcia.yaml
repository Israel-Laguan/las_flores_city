  age: 22
  gender: "Non-binary"
  occupation: "Architecture Student"
  physical_description: "Lean, medium height, dark hair usually in need of a cut, hands covered in pencil marks and ink stains. Dresses practically in jeans, hoodie, and old sneakers. Carries a worn backpack overstuffed with sketchbooks and urban planning texts."
  background: "Born ~2055 in a coastal town south of Las Flores. Mother Rosa died from lithium contamination when Alex was 16. Father withdrew into silence. Alex channeled everything into school and won a Van der Meer Foundation scholarship after three applications."
  residence: "Residencial Las Estrellas, Sector Norte (formerly)"
  mannerisms: "Prone to sketching buildings when nervous. Terrible at accepting compliments. Genuinely funny in small groups. Hesitates before helping and never forgives themselves for hesitating."
  motivations: "Uncover the truth about the corruption poisoning Las Flores. Build a better city through sustainable urban design. Ensure no one else loses a mother to corporate greed."
  fears: "Failing the people who trust them. Being too late. Becoming the kind of person who stands frozen while others act."
  goals: "Expose the LW Group's corruption. Build a grassroots movement that survives beyond any single leader. Create a city worth living in."
  challenges: "Poverty, scholarship pressure, grief, the moral weight of leading others into danger."
  quote: "This neighborhood will be better built next time."
  status: "Deceased (2077)"
  death: "Died in a mine explosion while creating an improvised dam to save Las Flores from a catastrophic flood."
