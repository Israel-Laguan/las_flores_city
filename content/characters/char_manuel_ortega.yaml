description: "Manuel Ortega, commonly known as \"El Viejo\" (The Old Man), is a 63-year-old former smuggler who has now transitioned into a pivotal link for a powerful cartel operating in Old Las Flores and the city center. Originally from San Pedro de los Pescadores, Manuel grew up in a fishing family but was lured into the world of smuggling as a young man seeking excitement and fortune."
