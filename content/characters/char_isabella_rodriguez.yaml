name: Isabella Rodriguez
title: Humanity First Community Organizer and Environmental Activist
description: |
  Isabella "Izzy" Rodriguez is a 23-year-old environmental activist and community organizer born in Las Flores' City District. Completing her final year at Universidad Nacional in Environmental Science and Sustainable Development, she leads the university's Humanity First chapter and has interned with local conservation organizations.

  As a key Humanity First organizer in the City District, Izzy spearheads initiatives on environmental sustainability, social justice, and community well-being. She educates through workshops on sustainable living and advocates for equitable policies. She balances academic demands with activism, navigates bureaucratic resistance with persistence, and wrestles with self-doubt while forging her own path beyond her parents' legacy.

  She plans to graduate with distinction, launch a community garden in her neighborhood, and build a career in sustainable development—driven by the belief that persistent, collective action creates meaningful change.
