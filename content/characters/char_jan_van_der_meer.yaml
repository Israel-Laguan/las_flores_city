name: "Jan van der Meer"
title: "CEO of GLC, Head of van der Meer Lithium Mining Dynasty"
description: "Jan van der Meer, born 2018, was the youngest child of Pieter and Annabella. He moved to Las Flores in 2030 at age 12, attending exclusive private school. More reserved than his extravagant brother Alexander, Jan focused on studies and local culture. In 2045 at 27, he married Maria Martinez; they had Peter, Anna, and Lucas. As his father retired from GLC, Jan took over, guiding the company toward sustainable practices and community investment, earning widespread respect. He struggled with Alexander's shadow until Alexander's fall. Jan supported his gay son Peter's marriage, earning respect from younger generations. Daughter Anna joined the business and married a Dutch cousin. Son Lucas battled drug addiction and mental health issues, kept hidden to protect family reputation. On January 15th, 2060, Jan died suddenly at 41 from a heart attack on a business trip. Maria, devastated, developed dementia. Peter, Anna, and Lucas took over family business and their mother's care."
