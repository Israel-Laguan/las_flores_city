name: Anna van der Meer
title: Van der Meer CEO & Social Advocate
description: |
  Anna van der Meer is the only daughter of Jan and Maria van der Meer, raised inside Old Las Flores privilege but shaped by a fierce sense of social responsibility. Independent, outspoken, and politically astute, she first gained attention through environmental protests against Van der Meer mining operations and socially conscious photography on inequality.

  After Jan's death in 2060, Anna became CEO of Van der Meer Industries and pushed modernization, lower environmental impact, and better worker conditions despite board resistance. She fiercely supported her brother Peter after he came out, co-founded an LGBTQ+ youth nonprofit, cared for Maria as dementia worsened after 2071, and won a Las Flores City Council seat in 2078 as a progressive advocate.
