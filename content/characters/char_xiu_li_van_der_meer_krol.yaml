name: Xiu Li van der Meer Krol
title: Councilwoman, Van der Meer Mining Operations
description: Mixed-heritage politician and mining executive in her mid-40s. Studied geology and business, rising through the family mining company to head of operations. In 2075, she ran for and won a seat on the local council, championing gender equality, education access, and workers' rights. She balances political career with mining responsibilities.
