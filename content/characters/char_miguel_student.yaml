id: "5d01a93e-2f11-47cc-9e67-ab10d48a946f"
name: "Marco Reyes"
title: "Retired Dockworker, Union Organizer"
description: "A retired dockworker from the Port District, Marco Reyes spent thirty years organizing labor at the port facilities. He knew Miguel Jhonson's father from the union and became an unexpected ally of the 2077 movement, providing access to the port's storage facilities for supply caches. He was instrumental in smuggling evidence documents out of the city to international journalists when the local media was compromised. After the transition, he advised on labor policy reform."
metadata:
  type: "human"
  role: "npc"
  faction: "independent"
  personality: "loyal_brave"
  age: 67
  gender: "Male"
  occupation: "Retired Dockworker, Union Organizer (Emeritus)"
  physical_description: "Broad shoulders, unhurried movement, grounding physical presence. Calm without being distant, protective without being controlling."
  background: "From the Port District. Thirty years of union organizing at Las Flores port facilities. Knew the Jhonson family from union work."
  residence: "Port District, Las Flores"
  mannerisms: "Thinks in terms of what the building requires — supply line, schedule, contingency plan. Does not romanticize the work. Does it."
  motivations: "Support the movement that honored his community. Protect workers' rights."
  fears: "Failing the people counting on him. Another phone call he can't answer."
  goals: "See the transitional work through. Build a city that doesn't need movements."
  challenges: "Grief for Carlos and Alex. The weight of being the one who survives."
  quote: "This neighborhood will be better built next time."
  status: "Active (2077 and beyond)"
