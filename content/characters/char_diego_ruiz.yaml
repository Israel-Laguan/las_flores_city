name: "Diego Ruiz"
title: "Airport Cleaner and Aspiring Social Climber"
description: |
  Diego Ruiz is a 26-year-old cleaner at Aeropuerto Internacional de Las Flores. He grew up in a working-class neighborhood and views his job as a stepping stone up the social ladder. Fit and well-groomed, he carefully styles his medium-length dark hair and dresses neatly to project confidence.

  An avid reader of dating psychology and self-improvement books, Diego spends free time at bars putting theory into practice. He believes mastering pickup techniques will attract the stunning partner he imagines, though his romantic pursuits often fall short of his ideals. He seeks a beautiful girlfriend to elevate his status and self-worth, while secretly struggling with inadequacy from his job.

  Charming yet naive, Diego remains optimistic that he will break free from his circumstances and find a love matching his aspirations.
