description: "Marco \"Mako\" Jiménez is a 30-year-old subordinate to Alejandro \"Alex\" Díaz, working closely with him within the local authority of San Pedro de los Pescadores. Coming from a modest background, Mako grew up idolizing those in positions of power, believing that success is earned through connections rather than hard work. His loyalty to Alex stems from a desire for upward mobility and the prospect of an easier lifestyle."
