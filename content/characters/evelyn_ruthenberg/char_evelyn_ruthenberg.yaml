name: Evelyn Ruthenberg
title: Whistleblower, Shadow Investigator, Architect of the 2077 Liberation
description: Former Luz del Rio engineer who discovered the Great Lithium Leak cover-up in 2053 after meeting activist Karla. She recovered key evidence from Karla's apartment but was assaulted by Minera Estrella enforcers and forced into hiding. After the 2057 acquittal destroyed her faith in legal justice, she allied with Yara Rossi and Dr. Wei Zhang on a phytoremediation plan while covertly building an intelligence network. When Yara was assassinated in 2059, Evelyn began a two-decade vigilante campaign, systematically killing eight architects of the cover-up. In 2077, she allied with Alex Garcia, providing tactical support for the grassroots movement. After the raid on Mayor Vega's estate, she surrendered to Chief Inspector Adeyemi and insisted he take credit. Her trial exposed the full cover-up; she was convicted of manslaughter, sentenced to fifteen years, and served four.
metadata:
  type: human
  role: npc
  faction: independent
  personality: shadow_investigator
  age: 48
  gender: Female
  occupation: Former Engineer at Luz del Río Energy Plant
  physical_description: Older than expected by 2077. The kind of tired that comes from two decades of solitary war. Moves with the precision of someone who has learned to be invisible.
  background: Young engineer at Luz del Río who discovered the lithium contamination cover-up in 2053. Spent twenty years dismantling the architects of the Great Lithium Leak one by one, alone, in the dark.
  mannerisms: Quick, efficient, tactical. Laughs rarely, trusts selectively. Direct to the point of severity.
  motivations: Hold those responsible for the Great Lithium Leak accountable. Ensure the truth cannot be buried again.
  fears: That her sacrifices meant nothing. That the system would absorb her testimony and continue as before.
  goals: Expose Minera Estrella and the LW Group. Create a record that cannot be suppressed.
  challenges: Isolation, survivor's guilt, the moral weight of the lives she took.
  quote: I am guilty of what I did. But I am not the only one.
  status: Active (released 2081)
