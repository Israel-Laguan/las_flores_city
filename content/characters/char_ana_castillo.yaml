name: "Sofia Castillo"
title: "Community Organizer, Sector Norte"
description: "A community organizer in Sector Norte, Sofia Castillo runs a local food cooperative that provides affordable groceries to the neighborhood. She was one of the early supporters of Alex's movement, allowing the cooperative's back room to be used for the first community meetings. She never joined the frontlines but was instrumental in building trust between the movement and the neighborhood's residents. After the 2077 broadcast, she served on the transitional council's food security committee."
