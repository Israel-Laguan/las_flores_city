id: d5e9f3a4-6b7c-4d8e-0f1a-2b3c4d5e6f7a
name: Carlos Lacan
title: University Student (Electrical Engineering), Technical Expert
description: "A close friend of Alex Garcia through Miguel, Carlos was an electrical engineering student who confirmed the HVAC sabotage theory and helped set up surveillance at Residencial Las Estrellas. Of European/French-Caribbean descent, the Lacan family has roots in Martinique before settling in Las Flores. Carlos was the person who said yes before you finished the sentence — not out of recklessness, but out of a kind of instinctive loyalty that found decline harder than the thing being declined. He was deeply, unambiguously kind: the kind that makes people feel like they are not a problem or an inconvenience. He died in a car chase while pursuing the killer's vehicle, cut off by a motorcycle that appeared from a side street. His death was the story's central wound — the moment that transformed the amateur investigation into a personal reckoning. He had a younger sister."
metadata:
  type: human
  role: npc
  faction: independent
  personality: loyal_brave
  age: 24
  gender: Male
  occupation: University Student (Electrical Engineering), Part-time Electronics Repair
  physical_description: Slightly built, quick hands that moved with precision when working. Had a habit of narrating what he was doing — a running technical commentary.
  background: Electrical engineering student from a working-class family on the city's northern edge. Won a partial scholarship; covered the remainder through part-time technical work at an electronics repair shop. Of European/French-Caribbean descent (Lacan family from Martinique).
  residence: Northern District, Las Flores
  mannerisms: Calm about technical problems that should be alarming. Made difficult things sound like puzzles worth solving. Funny in the way of someone who observed things accurately and reported them honestly.
  motivations: Help his friends. Use his skills to uncover the truth.
  fears: Letting people down. Not being there when someone needs him.
  goals: Figure out what's happening at the complex. Keep everyone safe.
  challenges: None — he was killed before the investigation reached its climax.
  quote: Whoever did this knew exactly what they were doing. They bypassed the safety protocols... it's sophisticated. And premeditated.
  status: Deceased (2077)
