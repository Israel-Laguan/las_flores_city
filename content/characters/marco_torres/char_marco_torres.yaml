title: Food Stall Manager
description: Grew up in humble farming family, relocated to Playa de los Vientos, worked from dishwasher to food stall manager. Now manages a food stall at Playa de los Vientos, specializing in tacos and fish sandwiches. Rugged yet approachable with dark brown hair and deep brown eyes. Hardworking and dedicated, serious and reserved at first, takes pride in craft, prefers actions over words.
