name: Ana Ramirez
title: Environmental Activist, Indigenous Rights Advocate, CJS Founder
description: |
  Ana Ramirez is a 32-year-old indigenous political leader who heads La Coalición por la Justicia Social (CJS). Born into a family of activists in Las Flores' rural outskirts, she witnessed mining's impact on native communities and ancestral lands firsthand. Inspired, she earned a degree in environmental science to protect both the environment and indigenous rights.

  As CJS founder, she crafts advocacy strategies, works with progressive politicians, and supports Yara Rossi's restoration efforts to mitigate mining damage and foster sustainable development. Her commitment drives bold stances against powerful interests, centering indigenous experiences.

  Her leadership prioritizes the voices of native communities. She speaks on environmental justice and indigenous rights intersectionality, prefers nonviolent direct action and grassroots organizing, and incorporates traditional practices into CJS's advocacy work.
