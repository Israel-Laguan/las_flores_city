name: Sofia Diaz
title: Singer-Songwriter, TV Personality, Social Activist (Músicos en Acción)
description: Raised in a working-class neighborhood of Old Las Flores, Sofia discovered her passion for music at an early age. After gaining popularity as a local musician, she used her platform to raise awareness about social issues affecting her community. Her activism eventually led to the creation of Músicos en Acción, a collective of artists dedicated to supporting various causes through their art.
