name: Julian Schneider
title: Business Administration Student, Future Hostel Manager
description: |
  Julian Schneider, 21, European descendant in Andean Mountains. Studies business admin at Central Las Flores university, planning to modernize family hostel. Grew up affluent yet grounded in hospitality demands. Charming, sociable, adventurous but sometimes entitled. Struggles with balancing social life and academics under parental pressure. Loves skiing, hiking, photography, sharing Andean beauty online. Wants guided tours, culinary workshops, cultural events at hostel.
