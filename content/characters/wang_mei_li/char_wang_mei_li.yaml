title: Founder, Dragon Phoenix Trading
description: Born in ~2005 to wealthy Shanghai immigrants, Mei Li grew up with strong entrepreneurial values. After divorcing Alexander van der Meer in ~2046, she founded Dragon Phoenix Trading ~2048-50. She is a resilient businesswoman dedicated to her children, her team, and building her legacy in the region.
