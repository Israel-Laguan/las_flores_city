name: "Elisa Pérez"
title: "Social Media & Community Manager, El Informador"
description: |
  Elisa Pérez is a Social Media & Community Manager at El Informador de Las Flores. She joined the newspaper as an intern while studying communications at the University of Las Flores and quickly rose through the ranks to become the paper's point-person for digital outreach and engagement. Her campaigns helped significantly grow El Informador's online presence and reader loyalty.

  Tech-savvy and empathetic, Elisa thrives on building two-way relationships between the newspaper and its audience. She crafts shareable content around local investigative stories, moderates community discussions, and turns readers into active participants in the news cycle. Despite the fast pace of digital media, she remains committed to responsible journalism and giving voice to underrepresented communities.

