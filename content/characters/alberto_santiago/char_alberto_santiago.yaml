name: Alberto Santiago
title: El Pescador - Coastal Seafood Vendor
description: |
  Alberto Santiago, known as 'El Pescador,' is a sturdy, sun-kissed seafood vendor who brings fresh Pacific Coast catch to Las Flores restaurants daily. Standing about 5'10" with salt-and-pepper hair and a warm smile, he wears practical clothing—well-worn t-shirts, cargo shorts, and sturdy sandals.

  Lively and outgoing, Alberto charms others with infectious humor and optimism. He grew up in a fishing family along the Pacific Coast, learning the trade from his father, and established a successful seafood vending business. Each morning he delivers fresh catch to restaurants, chatting with chefs about the freshest offerings.

  After deliveries, he indulges his sweet tooth at local bakeries, delighting in artisan sweets and playful flirting. He dreams of expanding his business and spreading joy through coastal flavors, valuing the connections he makes with customers and community.
