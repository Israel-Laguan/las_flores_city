description: "Carlos Konibo, a proud member of the Shipibo-Konibo tribe, has always been deeply connected to his roots. Born along the banks of Rio Las Flores, he grew up surrounded by lush greenery and the rhythmic sounds of the river's flow. From an early age, Carlos learned the traditional techniques passed down through generations - the intricate patterns, vibrant colors, and the sacred geometry that defines Shipibo art."
