name: Carlos Konibo
title: Shipibo-Konibo Artisan and Cultural Entrepreneur
description: |
  Carlos Konibo is a proud Shipibo-Konibo artisan and entrepreneur in his late 30s. Born along Rio Las Flores, he learned traditional Shipibo art techniques from his community—mastering the intricate patterns, vibrant colors, and sacred geometry passed down through generations.

  Witnessing globalization's impact on his people, Carlos developed a passion for sharing Shipibo heritage globally while preserving cultural integrity. He creates stunning textiles, pottery, and jewelry, selling through a cooperative to customers worldwide.

  Currently in Central City negotiating with an international online store, Carlos seeks a partnership that could expand his business while ensuring fair compensation for artisans and protecting traditional craft integrity.
