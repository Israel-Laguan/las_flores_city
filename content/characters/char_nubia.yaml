name: "Nubia"
title: "Activist, Karla's Partner"
description: "Karla's partner and fellow activist, murdered alongside Karla in February 2053. When Evelyn Ruthenberg discovered their apartment in September 2053, she found that the killers had ransacked the place but missed a small box containing crucial evidence: Karla's studies proving lithium contamination affected the Carinata crops, documentation of Minera Estrella's negligence, and the green pouch of Carinata seeds that had surprisingly resisted the contamination — seeds that would later become central to Dr. Wei Zhang's phytoremediation research."
