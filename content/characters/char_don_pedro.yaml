name: "Don Pedro"
title: "La Familia Gang Leader"
description: "Don Pedro — Pedro Vargas Castellano, 62 — has controlled La Familia's territory across the Industrial Zone and Old Las Flores border for over two decades. Born in the district, he runs his organisation as a substitute state: security where police response averages forty-seven minutes, protection for vendors the enforcement authority ignores, credit where formal lenders do not operate. The protection rackets and labour exploitation funding these services are, in his framing, a tax for maintaining order in a space the government chose to under-govern. His uneasy co-existence with El Caimán's Cartel and Dragon Head's Chinese Mafia is his most durable achievement — open conflict in 2055 and 2063 changed nothing territorially; his 2063 settlement has held fourteen years. His paternalistic style is genuine and extractive simultaneously: he attends events, resolves disputes, supports families in crisis, and runs protection rackets against the same people. Both are true, and they know it."
