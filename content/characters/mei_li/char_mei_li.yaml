name: Mei Li
title: Founder, Dragon Phoenix Trading
description: "Born in 2028 to wealthy Shanghai immigrants Wang Wei and Chen Yu, Mei Li grew up surrounded by luxury but with a strong work ethic. At 17, she met Alexander van der Meer and married him two years later, despite both families' disapproval. The union produced two children: Xiu Mei (2051) and Dong (2053). After Alexander's repeated infidelities culminated in a public scandal in 2060, Mei Li divorced him and retained custody. Determined to build her own legacy, she founded Dragon Phoenix Trading, an import-export business specializing in China-Las Flores trade — importing silk, teas, ceramics, and traditional medicines, and exporting local coffee, cacao, and lithium. With a team including childhood friend Li Wei as CFO, Maria Garcia as cultural advisor, and Jin Yu on sourcing, Dragon Phoenix became one of Las Flores' most successful trading companies. Mei Li uses her success to empower other women entrepreneurs through mentorship and resources."
