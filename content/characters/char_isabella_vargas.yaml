name: Isabella Vargas
title: Architecture and Urban Studies Student
description: An architecture and urban studies student in the same cohort as Alex Garcia, with a specialization in pattern recognition and intelligence analysis. Her grandfather lives alone in Las Flores's eastern district, and an uncle died under circumstances similar to the Las Estrellas victims — a death officially ruled an accident but never satisfactorily explained. That unresolved loss drove her to join Alex's investigation. She built a cross-referenced intelligence operation from public records, tracked the killer across multiple jurisdictions, and led the City Hall archive break-in that uncovered the paper trail connecting the building owners to Minera Estrella's cover-up. Cold-eyed where Alex was warm-hearted, they balanced each other precisely.
