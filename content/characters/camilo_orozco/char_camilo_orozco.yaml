name: Camilo Orozco
title: The Dead Friend
description: Camilo was Graciela's (Sofia's) closest friend in her hometown. He openly loved superheroes despite ridicule and genuinely believed people could help each other. He was killed in a violent attack, serving as the catalyst for Sofia's vigilante phase and her eventual migration to Las Flores.
