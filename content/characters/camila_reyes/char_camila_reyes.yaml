name: Camila Reyes
title: Environmental Science Student from Bahía de las Olas
description: |
  Camila Reyes is a spirited 19-year-old from Bahía de las Olas, a picturesque coastal village with stunning beaches and a vibrant fishing community. Growing up by the ocean, she developed a deep love for the sea and her hometown's cultural richness. As the first in her family to attend university, Camila is driven to create opportunities for herself and her community, pursuing a degree in Environmental Science with a focus on marine conservation. Her dream is to return to Bahía de las Olas after graduation to help implement sustainable fishing practices and preserve the coastline. Adventurous, passionate, and sociable, she radiates positivity and makes friends easily, though she sometimes struggles with homesickness and adjusting to city life after the tight-knit simplicity of her coastal home.
