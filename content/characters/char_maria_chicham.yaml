name: "Maria Chicham"
title: "Las Flores Resident"
description: "Maria Chicham hails from a remote village along the banks of Rio Las Flores, where she grew up immersed in Shipibo culture and traditions. From a young age, her parents recognized her exceptional intellect and encouraged her to pursue higher education. When an opportunity arose for a Dutch scholarship at Universidad Nacional de Las Flores, Maria seized it with determination. Now in her final year studying medicine, Maria has flourished academically while also adapting to urban life."
