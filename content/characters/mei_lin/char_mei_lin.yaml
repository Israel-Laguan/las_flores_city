name: Mei Lin
title: 22-year-old Business Student & Older Sister
description: "22-year-old business student and older sister to Lin Xiu. Has long, sleek black hair often in high ponytail, complementing angular jawline. Favors modern, chic clothing, combining high-fashion with streetwear for trendy yet approachable look. Exudes confident, sometimes intimidating presence. Feels responsibility weight as eldest, compensates for insecurities by trying to feel superior to peers. Sharp tongue, can be dismissive or condescending, but deep down longs for acknowledgment and respect. Grew up near port, often helped parents sell goods, giving strong work ethic. Currently attends university studying business. Despite academic success, navigates inadequacy feelings, occasionally mistreats others to elevate herself. Shares complex relationship with Lin Xiu: mutual support underpinned by competition. Reassure each other privately but turn against others when threatened. Bond rooted in shared experiences, making vulnerability moments rare but impactful."
