name: Alexander van der Meer
title: Former Executive at Global Lithium Corp
description: Born into privilege as eldest child of Pieter and Marleen van der Meer. Moved to Las Flores in his early 20s (~2015) for his father's GLC role. Married Wang Mei Li and had two children of the marriage (Xiu Li and Dong); his infidelity also produced an illegitimate son, Liam. Engaged in numerous affairs; in 2045 a scandal involving a young employee forced his resignation from GLC. Wang Mei Li divorced him and retained custody. By 2059, Alexander spiraled into alcoholism and depression. In 2077, a public incident forced him into rehabilitation. Now in his mid-80s, attempting to rebuild his life.
