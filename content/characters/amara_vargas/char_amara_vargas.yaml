name: Amara (Vargas)
title: Miner, Community Figure
description: Born deaf in the Andean region, Amara works as a mineral sorter at the local mine. Her keen eyes and strong work ethic earn her the respect of her coworkers. She is also a community figure, known for her resilience and dedication to supporting her daughter Marisol, who works as a mine safety inspector.
