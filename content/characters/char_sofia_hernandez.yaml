name: Sofia Hernánez
title: Conservationist, Hiker, Photographer
description: Sofia Hernánez is a 27-year-old conservationist from Las Flores' Andean region. She developed a passion for nature through childhood camping trips and now promotes environmental protection through outdoor activities. With an athletic build and practical style, Sofia combines her love for hiking, camping, and photography in her daily life. Her blog shares trail guides and sustainable camping tips, while she organizes community stargazing events. Sofia balances her conservation work with personal challenges of bureaucratic hurdles in park preservation and societal pressure to pursue conventional careers. She aims to become a regional conservation leader by creating eco-tourism opportunities and inspiring others to protect natural spaces.
