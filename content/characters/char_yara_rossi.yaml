name: "Yara Rossi"
title: "Businesswoman & Environmental Activist"
description: "Born in Ecuador in 2019 and moved to Las Flores in 2024 at age 5. Built a successful import-export firm specializing in sustainable goods, driven by her grandmother's teachings that 'true wealth is measured in integrity, not just profit.' Her father, a dockworker silenced by Minería Estrella when she was 14, became an unspoken specter fueling her fight for justice. Direct, astute, and compassionate, she refused to ignore what she witnessed. After surviving a fertility diagnosis and a painful separation from her partner Gabriel, she channeled her resolve into activism, founding entrepreneurship initiatives and sponsoring investigative journalism that exposed the lithium contamination. She met Evelyn Ruthenberg in February 2058 and became her crucial financial and strategic ally in the fight against Minería Estrella and the LW Group. Assassinated July 14, 2059, age 40, while traveling to meet international investors for the restoration project."
