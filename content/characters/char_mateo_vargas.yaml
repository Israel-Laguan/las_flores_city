title: Corrupt Customs Guard
description: Modest background in Las Flores, rose to prominence in customs division at Aeropuerto Internacional de Las Flores. Serves as customs guard who exploits tourists through bribes and confiscations, bends rules for personal gain. Has polished, professional demeanor with well-tailored uniform, neatly combed dark hair, chiseled jawline, sharp features, and piercing eyes.
