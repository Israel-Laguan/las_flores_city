name: Marleen van der Meer
title: First Wife of Pieter van der Meer
description: |
  Marleen van der Meer was the first wife of Pieter van der Meer and mother of Alexander and Elisabeth. She passed away before Pieter's move to Las Flores, leaving him to raise their children alone until he met and married Annabella.
