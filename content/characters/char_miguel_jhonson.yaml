name: "Miguel Jhonson"
title: "University Student, Logistics Chief of the 2077 Movement"
description: "Alex's oldest and closest friend in Las Flores. Born and raised in the city's western district, from a large extended family with roots going back generations. Of Anglo-Caribbean descent, the Jhonson family has been in Las Flores for three generations. Miguel is physically imposing — broad shoulders, unhurried movement — but grounding rather than intimidating. He ran the movement's physical logistics: safehouses, supply caches, communication relays, all organized through a network of local residents who trusted him. His deep roots in the western district gave him access to a kind of community loyalty that no external organizer could have manufactured. He was with Alex at the end at the mine entrance, and has never spoken publicly about those final moments. After the broadcast, he joined the transitional council and spent years in the unglamorous work of institutional rebuilding."
metadata:
  type: "human"
