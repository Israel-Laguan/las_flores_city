name: Juan Carlos Pérez
title: Community Organizer & Activist, Afro-Latino Rights Advocate
description: |
  Juan Carlos Pérez is a 45-year-old community organizer and activist born and raised in Old Las Flores. He has always been passionate about empowering his community, and after witnessing the marginalization of Afro-Latinos in politics and society, he became a vocal advocate for their rights.

  His work with COFAVIC exposed him to the intersections of racial injustice, environmental degradation, and political corruption. He is a natural leader who inspires others through his charisma and tenacity, driven by a deep empathy for his fellow Afro-Latinos and marginalized communities.

  He seeks to bridge the gap between Las Flores' diverse communities, fostering unity around shared goals of environmental restoration and social equity. He supports Yara Rossi's restoration efforts, seeing them as an opportunity to revitalize Old Las Flores and create jobs for its residents.
