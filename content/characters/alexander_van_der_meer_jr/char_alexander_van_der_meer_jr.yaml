name: Alexander van der Meer Jr.
title: European Businessman, Van der Meer Family Cousin
description: Alexander van der Meer Jr. is the son of Pieter van der Meer's brother Hendrik, making him first cousin to Elisabeth, Alexander, and Jan. Born and raised in Europe, he maintained close ties with the Las Flores branch of the family. In his youth, he had a brief romantic relationship with his cousin Elisabeth before she married Carlos Alberto Hernandez — a connection that led to confusion in later family records. Alexander Jr. built a successful import-export business in Rotterdam, occasionally visiting Las Flores for family events and business partnerships with GLC. He is the father of Nico van der Meer.
