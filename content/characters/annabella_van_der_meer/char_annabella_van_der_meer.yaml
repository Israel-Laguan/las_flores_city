name: Annabella van der Meer
title: Geologist, Global Lithium Corp
description: The Dutch geologist who discovered the massive lithium vein near Las Flores in 2029 by testing poisoned mine water. Her discovery launched Dutch involvement in the region and shaped the Van der Meer family philosophy of community respect. She married Pieter van der Meer and became step-mother to his children Alexander and Elisabeth from his first marriage, and later gave birth to their youngest child, Jan.
