name: "Jiao Yang"
title: "Community Advocate and Aspiring Graphic Designer"
description: |
  Jiao Yang is a second-generation Chinese-American born and raised in Las Flores' Chinatown neighborhood. She graduated from a local university with a Business Administration degree and works as an office assistant at a multinational corporation in the financial district. Despite her corporate role, she maintains Chinese heritage through traditional dance and community volunteering. Active in bridging Chinese-Western lifestyles through food exploration and graphic design hobbies. Balances office work with community service while saving for her first apartment.
