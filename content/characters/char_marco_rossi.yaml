description: "22-year-old business administration student at Universidad Nacional in Las Flores. Son of Italian sailor and Argentine woman, raised celebrating both cultures. Strikingly handsome with wavy dark hair, chiseled face, expressive green eyes, charismatic smile. Trendy, laid-back style with fitted shirts and stylish sneakers. Ambitious, dreams of running his own company but struggles with tuition. Studies business administration, aspiring to finance or marketing. Charming, sociable, enjoys center of attention with magnetic personality. Playful, loves engaging others, flirtatious, enjoys multiple girlfriends despite drama. Previously worked as waiter but grew bored. Seeks flexible work for money and social time. Avid social media user, documents adventures, cultivates fashionable image. Enjoys beach outings, Andean hikes, dining, nightlife. Dreams of financial stability and career success while balancing academics and relationships."
