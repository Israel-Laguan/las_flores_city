name: "Liu Mei"
title: "Vice-Mayor of Las Flores Free City"
description: "Liu Mei is a 44-year-old lawyer-turned-politician serving as Vice-Mayor under Mayor Carlos Rodriguez — a Progressive Alliance appointee selected in 2071 whose expertise in bilateral investment law governs the Chinese enclave's relationship with the city. Within the enclave she is seen as too assimilated, prioritising her Alliance platform over enclave interests. Among the Latino working class and Afro-Dutch minority some view her as an LW Group proxy, a perception rooted in her pre-political legal career. Her actual record contradicts this: she co-authored the 2074 surveillance disclosure proposal and consistently advocates for inequality reduction, arguing that redirecting investment from the enclave to the Industrial Zone is politically necessary. She knows that in Las Flores, being complex is not the same as being effective."
