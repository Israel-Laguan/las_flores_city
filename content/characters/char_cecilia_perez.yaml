name: "Cecilia Perez"
title: "Safety Auditor & Independent Researcher"
description: "Hired by Minera Estrella as a safety auditor in her early twenties, she documented structural weaknesses in the containment systems that were suppressed by LW Group. She then pivoted to independent research, obtaining a university grant under a cover proposal to study native and introduced plant species, specifically Carinata, and their influence on the local ecosystem. Her data proved pre-leak contamination. Murdered in City District in 2049, weeks from publishing. Her evidence was collected by Liu Fang and passed to Evelyn Ruthenberg, including data from her Carinata phytoremediation experiments and original suppressed audit reports."
