description: Xiu Mei was born in Las Flores in 2051 to Alexander and Mei Li, a union that bridged the gap between two prominent families from different backgrounds. Growing up, she faced challenges due to her mixed heritage and gender, particularly when it came to being recognized as a legitimate heir to the van der Meer mining dynasty.
