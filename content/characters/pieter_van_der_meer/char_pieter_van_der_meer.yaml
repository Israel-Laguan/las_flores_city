  personality: strategic_pragmatist
  appearance: 6'1" height, 190 lbs, chestnut brown hair neatly trimmed, brown eyes with sharp intelligent glint, strong jawline, prominent nose, athletic build with rugged edge, impeccably dressed in tailored suits
  interests: mining industry, global business, strategic planning, exploration, responsible resource development
  goals: develop sustainable lithium mining operation in Las Flores, foster international collaboration, implement environmentally responsible practices, create jobs and economic growth
  relationships: Annabella (wife, geologist), Alexander (son), Elisabeth (daughter), Jan (son)
  career: Mining company executive (1985-2015 Africa), Global Lithium Corp representative in Las Flores (2015-2035+), retired around 2035
  death: Died in 2045 at age 85
