name: Pieter van der Meer
title: Global Lithium Corp Executive, Mining Industry Leader
age: 85
description: Pieter Van der Meer was a formidable figure in the international mining industry, born into a family of Dutch diplomats and businesspeople. With a towering presence and strategic mind, he built a distinguished career spanning continents, from African mining operations to establishing Global Lithium Corp's presence in Las Flores. His life was marked by ambition, innovation, and a commitment to responsible resource development that balanced economic growth with environmental stewardship and community benefit.
