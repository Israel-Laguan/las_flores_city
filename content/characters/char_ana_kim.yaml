# Ana Kim

> Tags: `#character` `#ally` `#library` `#conscientious_objector`
>
> **Role:** University Library Worker, Former Investigator
> **Status:** Alive (left Las Flores, 2077)

## Overview

Ana Kim was a colleague of Alex Garcia at the university library. She was drawn into the Residencial Las Estrellas investigation by accident — she came to return Alex's forgotten notebook and ended up helping follow a car. She was sharp, warm, and consistently more competent than her role required.

After the City Hall archive break-in left her injured (swollen eye, bruised ribs, damaged wrist), Ana made the difficult choice to leave the investigation. She was not a coward — she recognized honestly what she could sustain without destroying herself. She sent money to the movement twice through untraceable channels, never asking for acknowledgment.

