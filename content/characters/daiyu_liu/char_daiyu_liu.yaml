name: Daiyu Liu
title: International Relations Student at UILF, Chinese Cultural Purist
description: |
  Daiyu Liu is a highly intelligent and ambitious woman in her mid-20s, born in China but moved to Las Flores with her family at a young age. Growing up in an affluent neighborhood near the Universidad Internacional de Las Flores (UILF) campus, she developed a sophisticated worldview and strong sense of her cultural identity.

  Currently pursuing a degree in International Relations at UILF on a full scholarship, Daiyu hopes to enter diplomacy or international business after graduation. She has a sharp wit and isn't afraid to speak her mind, often engaging in lively debates about geopolitical affairs and cultural superiority.

  Despite her academic accomplishments and social standing, Daiyu carries an air of arrogance and can come across as condescending to others, particularly those from different backgrounds or lower economic statuses. She holds strong views on race and culture, firmly believing in Chinese cultural superiority.
