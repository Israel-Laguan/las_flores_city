description: "Often called \"Val\" by friends, is a bright and determined young woman who has just completed her basic education in her small town near the Río de las Flores. At 18 years old, she stands at 5'6\" with dark hair often tied back in a loose ponytail, a casual style reflecting the simplicity of her upbringing. Her features bear the sun-kissed bronze of someone who has spent her life outdoors alongside her father, fishing in the river or helping at local markets."
