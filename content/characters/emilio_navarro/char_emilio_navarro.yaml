name: Emilio Navarro
title: Cultural Journalist, La Prensa
description: |
  Emilio Navarro is a 49-year-old cultural journalist at La Prensa, born and raised in Las Flores's multicultural neighborhoods. Educator parents nurtured his storytelling instincts and love of his city. At 25, his immersive coverage of local cultures and grassroots movements made him a rising star.

  Warm and endlessly curious, Emilio connects with people from all walks of life. He dresses casually in colorful button-down shirts, has warm smile, and carries a camera to document cultures and hidden corners. On weekends he cycles through neighborhoods discovering new stories.

  By 31, his coverage of Las Flores's emerging art scene brought national attention to local artists. At 49, he mentors younger journalists in narrative craft and the importance of giving voice to the voiceless, continuing to celebrate the diversity and resilience of Las Flores through participatory journalism.
