name: Isabella Marquez
title: Port Community Matriarch
description: |
  Isabella Marquez is a vibrant Latina community figure in Las Flores's bustling port district. Born in a small coastal village, she settled in the port area where she is beloved by sailors, dockworkers, and local families. Strong, expressive, and fiercely connected to her roots, she radiates warmth while navigating the challenges of raising three young sons alone.

  Known for long loose waves, sun-kissed skin, and expressive brown eyes, Bella dresses in vibrant flowing clothing and handmade jewelry that celebrate her heritage. Her home is a gathering place for neighbors and travelers, filled with Caribbean rhythms, home cooking, and laughter. She is fiercely protective of Joaquín, Mateo, and Luis while remaining unapologetically open about the joys and heartbreaks of her personal life.
