name: Pedro Quispe
title: University Student, Aspiring Entrepreneur
age: 19
description: Pedro Quispe is a 19-year-old university student caught between his family's expectations and his dreams of becoming a pilot. Having grown up near the airport where his parents manage a café and restaurant, Pedro has spent years helping at their establishment, gaining valuable experience in the food industry. Though he enrolled in Business Administration to eventually take over the family business, he still harbors aspirations of flight and struggles to reconcile his practical path with his childhood dreams.
