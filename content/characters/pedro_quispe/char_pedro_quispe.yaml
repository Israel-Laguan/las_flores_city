  interests: aviation, reading about pilots, watching documentaries, cooking, experimenting with recipes
  goals: finish his Business Administration degree, support his parents' café, explore aviation-related careers, find balance between family obligations and personal aspirations
  job: University student studying Business Administration, part-time restaurant worker
