name: "Diego Reyes"
title: "Community Activist"
description: "A passionate community manager from a local activist group who approached Evelyn and Alex to help gain visibility for their cause. He proposed a more extreme and flashy approach with a new logo and slogan, which Evelyn and Alex were hesitant to fully embrace. After the movement separated from his group, Diego was falsely arrested by Chief Inspector Adeyemi for the Residencial Las Estrellas murders — a framing that collapsed when the 2077 broadcast exposed the true nature of the case. He was released within seventy-two hours of the broadcast and gave a single brief press statement before declining further interviews."
