name: Carlos Rodriguez
title: Mayor of Las Flores Free City
description: |
  Carlos Rodriguez is a 48-year-old Progressive Alliance mayor serving his second term. A founding member, his partnership with Ana Silva — the coalition's environmental policy architect — anchors his agenda. Together they co-authored three contamination oversight bills; two passed in weakened form under LW Group lobbying pressure.

  His contested position defines him: a reformist mayor governing a city whose largest employer is LW Group. His statements invoke the 2052 Great Lithium Leak and its health impacts; his environmental legislation contains enforcement provisions analysts call toothless.

  Rodriguez is pragmatic: he identifies the achievable within his constraints, achieves it, and calls it progress.
