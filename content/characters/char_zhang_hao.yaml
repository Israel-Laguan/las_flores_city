name: Zhang Hao
title: Customs Officer, Port of Las Flores
description: A 45-year-old customs officer at the busy port, Zhang Hao is a robust, self-serving man who leverages his position for bribes, favors, and control. Shrewdly manipulative and outwardly charming, he hides a deep insecurity behind a confident, imposing exterior. His cultural favoritism, harassment of female employees, and compulsive gambling define a man who uses corruption to maintain the power he fears losing.
