name: "Alberto Santiago"
title: "El Pescador - Coastal Seafood Vendor"
description: "Alberto Santiago, known as 'El Pescador,' is a charismatic seafood vendor bringing fresh Pacific Coast catch to Las Flores restaurants daily. Born into a fishing family, he transitioned from boat work to supplying seafood, becoming a beloved figure in the culinary scene. Outgoing and humorous, Alberto builds strong relationships with chefs through his warm personality and reliable deliveries. After morning routes, he indulges his sweet tooth at local bakeries, engaging in playful flirtations with 'city girls.' While dreaming of business expansion, he prioritizes community connections, embodying coastal charm in the urban landscape."
