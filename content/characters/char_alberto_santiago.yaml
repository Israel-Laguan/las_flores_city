name: "Alberto Santiago"
title: "El Pescador - Coastal Seafood Vendor"
description: "Alberto grew up along the Pacific Coast, hailing from a family of fishermen. He learned the trade from his father and has spent most of his life working on fishing boats. As the industry evolved, he adapted by establishing himself as a seafood vendor, supplying fresh fish and seafood to restaurants in Las Flores. Lively and outgoing, Alberto is a social butterfly with a warm demeanor and quick sense of humor. Every morning, he sets off from the coast with his catch of the day, delivering fish and seafood to various restaurants throughout Las Flores. He enjoys the hustle and bustle of the city, often arriving early to chat with chefs and kitchen staff about the freshest catch. When he's finished delivering seafood, Alberto loves to indulge in the sweeter side of life, visiting local bakeries and trying different pastries and treats. He has a playful approach to flirting, especially with the city girls he meets during his deliveries or while enjoying his sweets. While he dreams of expanding his seafood business, Alberto values the connections he makes with both his customers and the community. He aims to bring the flavors of the Pacific Coast to the heart of Las Flores while spreading joy with his infectious personality."
