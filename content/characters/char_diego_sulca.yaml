name: Diego Sulca
title: Environmental Science Student, Fisherman's Son from San Pedro de los Pescadores
description: |
  Diego Sulca is a 19-year-old university student hailing from a modest background, embodying the journey of a young man caught between aspiration and anxiety. His mother is from San Pedro de los Pescadores, and his father comes from Old Las Flores, where they instilled in him the values of hard work and perseverance. Diego is determined to make a better life for himself, but he finds himself grappling with the harsh realities of university life.

  Diego has a lean, athletic build from years of helping his mother with fishing. He has dark, curly hair and warm brown eyes that reflect his inherent kindness but also reveal his shyness. His clothing typically consists of comfortable, casual wear, often a bit rumpled due to his easygoing nature. He prefers practicality over fashion, reflecting his working-class roots.
