title: "Las Flores Resident"
description: "A 19-year-old university student hailing from a modest background. His mother is from San Pedro de los Pescadores, and his father comes from Old Las Flores, where they instilled in him the values of hard work and perseverance. Diego is determined to make a better life for himself, but he finds himself grappling with the realities of university life. Appearance Diego has a lean, athletic build from years of helping his mother with fishing."
