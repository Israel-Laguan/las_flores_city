name: Sofia Garcia
title: Former Miner, Community Figure
description: |
  Sofia Garcia is a former miner and community figure in Old Las Flores. Sister of Alex Garcia, she walks with a cane and lip-reads to communicate. Born deaf, she developed exceptional lip-reading and visual observation skills. After a mining accident in 2063 left her with a crushed leg, she became homeless but remains a symbol of resilience in the community. Her daughter Ariana studies to become a doctor.
