name: Lucas Morales
title: First-Year Engineering Student, Aspiring Marine Biologist
description: |
  18-year-old from Playa de los Vientos fishing town. Grew up helping father on fishing boats, developed ocean connection. Now studying engineering at Universidad Nacional but struggling with coursework. Pressured by family to stick with engineering vs. true passion for marine biology. Homesick and uncertain about career path. Wearing casual attire, shows determination but hides insecurities. Fears disappointing family if he switches majors.
