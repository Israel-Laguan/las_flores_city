name: Carlos Hernandez
title: Mayor of Old Las Flores (2000-2034)
description: |
  Carlos Hernandez was the dominant political figure in Las Flores during its transformation from a small mining town into a global lithium hub. Serving as mayor for nearly four decades, he navigated the city through the lithium boom and the controversial creation of the Free City.
