description: "Managing Director of El Informador de Las Flores. He has deep roots in the indigenous communities and a personal commitment to giving a voice to the marginalized. - Editor-in-Chief & Managing Director of El Informador de Las Flores - - Born into a family of indigenous activists in the rural outskirts of Las Flores. - Studied journalism at the National University of Las Flores, specializing in community reporting. - Spent early career covering social issues and human rights abuses in marginalized communities.."
