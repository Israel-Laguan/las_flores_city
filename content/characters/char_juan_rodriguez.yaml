name: "Juan Carlos Pérez"
title: "Human Rights Lawyer, COFAVIC Founder & Director"
description: |
  Juan Carlos Pérez, 45, human rights lawyer and COFAVIC founder. Brother's disappearance during criminal violence inspired his justice work. Provides legal aid, advocacy, and emotional support for victims' families through COFAVIC. Faces resistance but remains committed, using legal expertise to hold perpetrators accountable. International recognition via partnerships with Human Rights Watch and Amnesty International. Empathetic and strategic, key figure in Las Flores' human rights movement. Organizes victim support groups, collaborates with activists to raise awareness. Resilient, dedicated to safer society. Spanish primary language, fluent in English.
