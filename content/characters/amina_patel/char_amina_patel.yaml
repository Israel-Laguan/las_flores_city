name: Amina Patel
title: CLM Finance Manager
description: |
  Amina Patel is a South Asian Indian finance manager in her mid 30s at China Lithium & Metals. Born and raised in Mumbai, she came to Las Flores eight years ago for better work opportunities after earning her finance degree from the Indian Institute of Management Ahmedabad. Intelligent, meticulous, and private, she excels at analyzing complex financial data while avoiding attention.

  In CLM's male and Chinese-dominated corporate environment, Amina faces subtle discrimination that limits her promotion prospects despite her competence. She has noticed signs of bribery and money laundering inside the company, but lacks hard evidence and stays silent out of fear for her job and safety. She lives in a gated community outside the city center with other Indian expatriates and keeps upgrading her skills through online courses.
