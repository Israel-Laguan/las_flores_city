name: "Peter van der Meer"
title: "Van der Meer Family Member, LGBTQ+ Advocate"
description: "Son of Jan and Maria van der Meer. Publicly revealed his homosexuality in 2065, sparking a turning point for LGBTQ+ rights in Las Flores. Married Rafaela in a marriage of convenience; father of Peter Jr. As the eldest child of Jan and Maria van der Meer, Peter was always expected to take on a significant role within the family business. Born into privilege, he attended exclusive schools and enjoyed a charmed childhood amidst the opulence of Old Las Flores society. However, as he grew older, Peter began to question the path laid out before him."
