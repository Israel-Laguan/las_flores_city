description: "Husband of Annabella, Pieter orchestrated the Free City initiative to counterbalance Chinese dominance in Las Flores. A strategic pragmatist who secured Dutch control of the south and airport through negotiation and political maneuvering. Character Pieter van der Meer Pieter van der Meer was born into a family of Dutch diplomats and businesspeople, instilling in him a sense of global responsibility and ambition from an early age. After completing his education in the Netherlands, he embarked on a career with a prominent mining company, eager to make his mark on the world."
