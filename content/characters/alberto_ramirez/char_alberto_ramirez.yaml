id: alberto_ramirez
name: Alberto Ramirez
title: The Younger Brother
description: Alberto is Sofia's (Graciela's) younger brother. Growing up in a secondary South American city, he found himself orbiting local gang activity, not as a kingpin, but as a disposable kid—a messenger, a watcher, a motorcycle runner. His presence in her life constantly reminds Sofia of the kids she is trying to save in Las Flores.
