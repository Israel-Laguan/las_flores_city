title: Student Activist
description: Sofia Mendoza navigates the working-class corridors of Universidad del Valle with a worn copy of vintage hero comic books tucked into her canvas jacket. Born in a secondary city in South America and having witnessed the collapse of community institutions firsthand, she carries a grounded belief in justice despite the social decay in Las Flores. Her modest street clothes and stack of printed community flyers reflect her practical, everyday realism in a city where corporate interests control public life.
