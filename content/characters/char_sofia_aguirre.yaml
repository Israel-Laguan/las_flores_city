title: Nursing Student & Healthcare Aspirant
description: A 32-year-old nursing student from San Pedro de los Pescadores who moved to Las Flores for professional growth. She aims to secure an administrative healthcare position in her hometown or Old Las Flores to improve local services. Her bubbly personality and motherly nature make her a natural mentor to younger peers, while her playful romantic side adds complexity.
