id: d848a4a6-e764-45c0-96ce-0bfe36d6762f
name: Li Wei
title: Founding Investor & Former CEO, LW Group
description: |
  The architect of LW Group's dominance in Las Flores and a former CEO who bridged Chinese state interests with local power. While he projected an image of a benevolent patriarch, he is the man who approved the 2052 Great Lithium Leak cover-up and orchestrated the murder of whistleblower Cecilia Perez. Now in his 90s, he serves as an advisor and "emperor in the shadows," wielding immense influence through a network of secrets and debts. He is a study in contradiction: a cultured, soft-spoken elder whose legacy is built on cold calculus and the erasure of those who stood in the way of his strategic vision.
