name: Maria Martinez van der Meer
title: Matriarch of the van der Meer Family
description: Born into a prominent Las Flores family with deep social and political roots. Educated at exclusive European institutions, she married Jan van der Meer, son of industrialist Pieter van der Meer. As a young woman, she became a force in high society with her elegance, charm, and intellect. Legendary beauty with striking dark hair, piercing eyes, and radiant smile. After marrying Jan in 2044, she became mother to Peter, Anna, and Lucas, hosting lavish galas while supporting philanthropic efforts in education, healthcare, and poverty alleviation. Despite her glamorous persona, she had a compassionate heart, working tirelessly for local charities. Faced family challenges including Peter's coming out, Anna's activism, and Lucas's addiction struggles. Developed dementia in later years, with Anna caring for her. Found solace with Dirk, an elderly servant and constant companion.
