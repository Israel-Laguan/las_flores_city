name: Kun Zhang
title: Retired Textile Factory Supervisor, Chinese Community Elder
description: |
  Kun Zhang, 75, Chinese immigrant and retired textile factory supervisor. Arrived young, rose to leadership over 30 years, now retired with pension. Unofficial liaison between Chinese officials and local business owners. Wise elder in Las Flores Chinese community, preserving traditions while mentoring family and younger residents.
