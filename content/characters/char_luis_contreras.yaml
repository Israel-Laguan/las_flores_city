name: Luis Contreras
title: Engineering Student at Universidad Nacional de Las Flores
description: Third-year engineering student at Universidad Nacional de Las Flores, born in a small village along Rio Las Flores to Shipibo-Konibo mother and Peruvian father from Lima. From early age, felt torn between mother's vibrant community-focused culture and father's individualistic urban lifestyle. As he grew older, became aware of stares and whispers in village, as some saw mixed heritage as dilution of proud Shipibo identity. At 18, left village behind, taking father's last name Contreras to distance himself from Konibo roots, believing it easier to navigate academia without indigenous surname. Decision brought inner turmoil, feeling like betrayal of mother's heritage. Now excels academically but struggles socially. Peers tease about mixed heritage, not understanding it's source of deep pride. Remains torn between embracing Konibo identity and pressure to fit in as regular university student. Focuses on studies to make something of himself despite obstacles.
