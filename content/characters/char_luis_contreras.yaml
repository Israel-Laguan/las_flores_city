  background: born in small village along Rio Las Flores to Shipibo-Konibo mother and Peruvian father from Lima, father left Peru to work abroad, raised in mother's community, experienced stares and whispers about mixed heritage, left village at 18
  mannerisms: quiet reserve, thoughtful demeanor, internal dialogue about identity, sometimes distant in social interactions
  motivations: make something of himself through education, prove himself on his own merits, find belonging, reconcile dual heritage
  fears: never fully belonging in either world, being judged for his mixed heritage, betraying his mother's people by adopting father's name, failing to reconcile his identity
  goals: graduate from Universidad Nacional de Las Flores, build successful engineering career, eventually embrace and reconcile both halves of his heritage, find true sense of belonging
  challenges: navigating identity between two cultural worlds, social struggles at university despite academic success, teasing from peers about mixed heritage, pressure to fit in as regular student while feeling pride in indigenous roots
  inner_conflict: torn between embracing Konibo identity and pressure to assimilate, adopted father's surname to escape indigenous stereotypes but still feels like outsider, oscillates between celebrating roots and hiding from judgment
  timeline:
    - "Age 18: Left village along Rio Las Flores, adopted father's surname Contreras"
    - "Currently: Third year engineering student at Universidad Nacional de Las Flores"
  quote: I thought changing my name would make it easier. But you can't outrun who you are.
  methods: focusing on academic excellence, maintaining quiet reserve, navigating social situations with caution, using engineering as escape from identity questions
  allies: academic mentors at Universidad Nacional de Las Flores, other students who understand outsider status
  enemies: prejudiced classmates who tease him about his heritage, his own self-doubt
  legacy: represents complex experience of straddling multiple cultural worlds, embodies challenge of reconciling different parts of oneself in a society that demands clear allegiances, demonstrates courage required to embrace full complexity of heritage
