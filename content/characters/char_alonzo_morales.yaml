name: Alonzo Morales
title: Airport Bodega Handyman
description: |
  Alonzo Morales is a 30-year-old Afro-Latino handyman at a neighborhood bodega near the airport. Raised in a vibrant working-class community, he learned that a repaired shutter, stocked shelf, or hot meal can hold a block together as much as any official program. He maintains the shop, helps customers, handles odd repairs, and turns the bodega into a loud, welcoming crossroads for airport workers, neighbors, and travelers.

  Sturdy from years of labor, Alonzo wears work boots, jeans, plain t-shirts, and a battered bodega-logo overshirt. He has short, tightly coiled black hair, warm brown skin, and a booming voice that cuts through traffic noise. Off the clock he loves salsa, reggaeton, cooking for friends, and community events. His dream is to own a bodega that doubles as a neighborhood social and cultural hub.
