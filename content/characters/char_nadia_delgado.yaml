name: Nadia Delgado
title: Seafood Stall Operator at Bahía de las Olas
description: Nadia grew up in Bahía de las Olas, surrounded by the rich marine life and vibrant tourism that define the town. Coming from a family of fishermen, she developed a strong affinity for the ocean and learned the ins and outs of seafood preparation from a young age. Bubbly and lively, she has a magnetic personality that draws tourists to her stall.
