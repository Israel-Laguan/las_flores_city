name: Anneliese Jansen
title: Companion for Hire - Las Flores Port District
description: |
  Anneliese Jansen is a 27-year-old woman of Dutch and French descent who grew up near the bustling port area of Las Flores. Her Dutch father left when she was young, leaving emotional scars that shaped her approach to men and intimacy. Conscious of her appearance and fitness, she styles her long flowing hair elegantly and favors smart, edgy fashion that commands attention. Her expressive eyes shift between confidence and vulnerability. Bold yet manipulative, she navigates relationships with older men through charm and wit, offering a "girlfriend experience" to sugar daddies while maintaining emotional distance. She has a soft spot for needy middle-aged men she meets in bars, yet feels betrayed when they leave upon discovering her work. Juggling multiple arrangements, Anneliese now questions whether there is room in her life for genuine love outside the transactional world.
