name: Fatima El-Kholi
title: Mid-level Executive Manager, LW Group
description: |
  Fatima El-Kholi is a Middle Eastern/Arab (Egyptian) woman in her late 30s, born and raised in Cairo. She earned an MBA in Finance from the American University in Cairo and moved to Las Flores five years ago for professional opportunity. As a mid-level executive manager at LW Group, she oversees logistics operations for the Chinese conglomerate.

  Confident, assertive, and fiercely independent, Fatima has cultivated a polished, cosmopolitan persona since arriving in Las Flores. Education and professional achievement are central to her identity, yet she now lives a more liberated personal life as a bisexual woman actively seeking relationships with university students and young adults through dating apps.
