name: Lucia Torres
title: Airport Stand Vendor, Seller of Local Crafts and Andean Products
description: |
  Lucia Torres, 28, from Camino Verde neighborhood of Las Flores. Grew up in family that operated small shop, learning values of dedication and customer service. Runs stand at Aeropuerto Internacional de Las Flores selling local crafts, snacks, and traditional Andean products including handmade textiles, artisanal cheeses, and souvenirs. Emphasizes quality/authenticity, sharing cultural stories behind each product. Popular with locals/tourists for genuine representation of Las Flores heritage. Warm, optimistic, humorous presence in airport environment. Hardworking spirit of Camino Verde reflected in her business approach.
