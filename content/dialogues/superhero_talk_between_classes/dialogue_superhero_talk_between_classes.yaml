id: f2a3b4c5-d6e7-8901-5678-012345678901
name: Superhero Talk Between Classes
description: Between the gleaming towers of the elite and the rain-soaked streets where the forgotten scrape by, an idealistic advocate and a street-smart journalist debate whether heroes still exist in Las Flores — or if salvation has become just another commodity traded in corporate boardrooms.
start_node_id: start
nodes:
  start:
    id: "start"
    type: narrator
    text: "The university courtyard is alive with students between classes. Near a fountain, Elena—an idealistic social advocate—and Javier, a street-smart journalist from the Undercity Beat, are deep in debate. The contrast between them is stark: her polished blazer versus his leather jacket, her hope versus his cynicism."
    thought: "An old argument, but one that never gets resolved. Do heroes exist, or are we all just commodities now?"
    effects:
      flag_set:
        superhero_debate_contact_made: true
    choices:
      - id: "join_debate"
        text: "Join the conversation"
        next_node_id: "elena_opening"
        time_block_cost:
          amount: 1
          description: "Engaging in debate"
      - id: "observe_first"
        text: "Listen for a moment first"
        next_node_id: "observe_debate"
        time_block_cost:
          amount: 1
          description: "Observing the discussion"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  observe_debate:
    id: "observe_debate"
    type: narrator
    text: "Elena gestures passionately. 'Javier, you can't tell me that people don't still fight for what's right. Look at the community centers, the mutual aid networks—' Javier cuts her off with a smirk. 'Those are Band-Aids on bullet wounds, Elena. Real change? That costs money. And in this city, money buys compliance, not heroism.'"
    thought: "Javier's cynicism has weight. But Elena's idealism... that's what keeps people going."
    choices:
      - id: "join_debate"
        text: "Join the conversation"
        next_node_id: "elena_opening"
        time_block_cost:
          amount: 1
          description: "Engaging in debate"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  elena_opening:
    id: "elena_opening"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678901"
    text: "Javier, you're so jaded. Of course heroes exist. I see them every day—teachers working double shifts, neighbors sharing their last credits, people standing up to corporate bullies. That's heroism."
    thought: "She believes it. Really believes it. The question is whether she's naive or visionary."
    effects:
      flag_set:
        superhero_elena_idealism_shared: true
    choices:
      - id: "agree_with_elena"
        text: "I agree. There are still good people here."
        next_node_id: "elena_agreement"
        time_block_cost:
          amount: 1
          description: "Supporting idealism"
      - id: "challenge_elena"
        text: "That sounds like wishful thinking."
        next_node_id: "javier_counter"
        time_block_cost:
          amount: 1
          description: "Questioning optimism"
      - id: "ask_javier"
        text: "Javier, what's your take?"
        next_node_id: "javier_cynicism"
        time_block_cost:
          amount: 1
          description: "Seeking the other side"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  elena_agreement:
    id: "elena_agreement"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678901"
    text: "Exactly! *smiling* And that's what keeps this city from collapsing into the abyss. Every small act of defiance, every moment of genuine connection—it adds up."
    thought: "She's not naive. She's seen the darkness and chooses to light candles anyway."
    effects:
      flag_set:
        superhero_idealism_supported: true
    choices:
      - id: "ask_about_examples"
        text: "Give me an example of this heroism."
        next_node_id: "elena_example"
        time_block_cost:
          amount: 1
          description: "Seeking proof"
      - id: "challenge_again"
        text: "But what about the ones who get crushed?"
        next_node_id: "elena_concede"
        time_block_cost:
          amount: 1
          description: "Playing devil's advocate"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  elena_example:
    id: "elena_example"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678901"
    text: "Last month, a group of Old Town residents organized a food share when the Market prices spiked. No corporate backing, no strings attached. Just people helping people. That's heroism to me."
    thought: "A concrete example. Hard to argue with that level of specificity."
    effects:
      flag_set:
        superhero_example_given: true
    choices:
      - id: "admire"
        text: "That's genuinely inspiring."
        next_node_id: "elena_thanks"
        time_block_cost:
          amount: 1
          description: "Expressing admiration"
      - id: "javier_rebuttal"
        text: "Javier, what do you think about that?"
        next_node_id: "javier_counter_example"
        time_block_cost:
          amount: 1
          description: "Bringing Javier in"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  elena_thanks:
    id: "elena_thanks"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678901"
    text: "Thank you. *genuinely touched* It's easy to get cynical in this city. But if we give up on the idea of heroism, what's left?"
    thought: "She's not just idealistic. She's fought for this belief."
    effects:
      flag_set:
        superhero_idealism_affirmed: true
    choices:
      - id: "ask_javier_final"
        text: "Javier, any final thoughts?"
        next_node_id: "javier_final"
        time_block_cost:
          amount: 1
          description: "Seeking balance"
      - id: "end_conversation"
        text: "You've given me a lot to think about."
        next_node_id: "superhero_farewell"
        time_block_cost:
          amount: 1
          description: "Ending debate"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  elena_concede:
    id: "elena_concede"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678901"
    text: "*sighs* You're right. Some do get crushed. But that doesn't mean we stop trying. If we do, the corporates win by default."
    thought: "A moment of vulnerability. She's not blind to the costs."
    effects:
      flag_set:
        superhero_costs_acknowledged: true
    choices:
      - id: "ask_javier_final"
        text: "Javier, any final thoughts?"
        next_node_id: "javier_final"
        time_block_cost:
          amount: 1
          description: "Seeking balance"
      - id: "end_conversation"
        text: "You've given me a lot to think about."
        next_node_id: "superhero_farewell"
        time_block_cost:
          amount: 1
          description: "Ending debate"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  javier_cynicism:
    id: "javier_cynicism"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678902"
    text: "Heroes? *laughs* Elena, wake up. This city chews up idealists and spits them out. The only 'heroes' are the ones who learn to play the game. And even they don't last long."
    thought: "Harsh. But there's truth in it. The Undercity doesn't reward idealism."
    effects:
      flag_set:
        superhero_javier_cynicism_shared: true
    choices:
      - id: "agree_with_javier"
        text: "Unfortunately, he's not wrong."
        next_node_id: "javier_agreement"
        time_block_cost:
          amount: 1
          description: "Validating cynicism"
      - id: "challenge_javier"
        text: "That's a self-fulfilling prophecy."
        next_node_id: "elena_rebuttal"
        time_block_cost:
          amount: 1
          description: "Defending hope"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  javier_counter:
    id: "javier_counter"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678902"
    text: "Oh please. Mutual aid networks? That's survival, not heroism. They're just trying not to drown. The real heroes would be the ones who drain the swamp."
    thought: "He's got a point. But is he just bitter, or does he have the clearer view?"
    effects:
      flag_set:
        superhero_cynicism_deepened: true
    choices:
      - id: "defend_elena"
        text: "Survival with dignity is still heroism."
        next_node_id: "elena_rebuttal"
        time_block_cost:
          amount: 1
          description: "Supporting Elena"
      - id: "ask_for_solution"
        text: "So what's your solution, then?"
        next_node_id: "javier_solution"
        time_block_cost:
          amount: 1
          description: "Seeking answers"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  javier_counter_example:
    id: "javier_counter_example"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678902"
    text: "Food shares? That's damage control, Elena. The heroism would be preventing the price spikes in the first place. But nobody's doing that, are they?"
    thought: "He's reframing the argument. From his perspective, small acts don't address root causes."
    effects:
      flag_set:
        superhero_root_cause_highlighted: true
    choices:
      - id: "defend_small_acts"
        text: "Small acts still matter."
        next_node_id: "elena_rebuttal"
        time_block_cost:
          amount: 1
          description: "Defending incrementalism"
      - id: "ask_javier_solution"
        text: "So what would you do differently?"
        next_node_id: "javier_solution"
        time_block_cost:
          amount: 1
          description: "Seeking alternatives"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  javier_agreement:
    id: "javier_agreement"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678902"
    text: "*shrugs* Yeah, well. Someone's gotta see the world as it is. Doesn't mean I like it."
    thought: "Cynicism as self-defense. He's been hurt before."
    effects:
      flag_set:
        superhero_cynicism_understood: true
    choices:
      - id: "end_conversation"
        text: "I need to think about this."
        next_node_id: "superhero_farewell"
        time_block_cost:
          amount: 1
          description: "Ending debate"
      - id: "ask_javier_final"
        text: "Elena, what do you think about that?"
        next_node_id: "elena_final"
        time_block_cost:
          amount: 1
          description: "Seeking Elena's response"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  javier_solution:
    id: "javier_solution"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678902"
    text: "Solution? *bitter laugh* There isn't one. Not in this city. The game's rigged. Best you can do is survive with your soul intact. And even that's a stretch most days."
    thought: "That's a bleak worldview. But in the Undercity, it might be realistic."
    effects:
      flag_set:
        superhero_bleak_realism_shared: true
    choices:
      - id: "end_conversation"
        text: "That's... depressing."
        next_node_id: "superhero_farewell"
        time_block_cost:
          amount: 1
          description: "Ending debate"
      - id: "ask_elena_response"
        text: "Elena, respond to that?"
        next_node_id: "elena_final"
        time_block_cost:
          amount: 1
          description: "Seeking hope"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  javier_final:
    id: "javier_final"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678902"
    text: "Look, I get why Elena believes what she does. And maybe she's right that it keeps her going. But out there? *gestures toward the city* In the real Las Flores? Heroes are a luxury we can't afford."
    thought: "The debate won't be resolved today. Or maybe ever. But the tension between hope and realism is what makes this city interesting."
    effects:
      flag_set:
        superhero_final_perspective_shared: true
    choices:
      - id: "thank_both"
        text: "Thanks for the discussion. I need to think about this."
        next_node_id: "superhero_farewell"
        time_block_cost:
          amount: 1
          description: "Ending debate"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  elena_rebuttal:
    id: "elena_rebuttal"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678901"
    text: "Javier, if we all waited for the perfect solution, nothing would ever get done. Sometimes you have to light candles in the dark, even if you can't banish it completely."
    thought: "A beautiful metaphor. She's not just idealistic—she's wise in her own way."
    effects:
      flag_set:
        superhero_candles_metaphor_shared: true
    choices:
      - id: "agree"
        text: "I like that. Candles in the dark."
        next_node_id: "elena_thanks"
        time_block_cost:
          amount: 1
          description: "Appreciating wisdom"
      - id: "javier_final"
        text: "Javier, final word?"
        next_node_id: "javier_final"
        time_block_cost:
          amount: 1
          description: "Seeking balance"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  elena_final:
    id: "elena_final"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678901"
    text: "Javier, I won't change your mind today. But I hope one day you'll see that giving up on heroism means giving up on the city itself. And Las Flores deserves better than that."
    thought: "She's not backing down. There's steel beneath that idealism."
    effects:
      flag_set:
        superhero_hope_defended: true
    choices:
      - id: "end_conversation"
        text: "Well said, Elena."
        next_node_id: "superhero_farewell"
        time_block_cost:
          amount: 1
          description: "Ending debate"
      - id: "reject_debate"
        text: "This isn't my concern."
        next_node_id: "node_superhero_rejection"
        time_block_cost:
          amount: 1
          description: "Avoiding the debate"

  superhero_farewell:
    id: "superhero_farewell"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678901"
    text: "The debate ends, but the question lingers. Do heroes still exist in Las Flores? Maybe the answer is that they have to."
    thought: "Some debates aren't meant to be resolved. They're meant to be lived."
    effects:
      flag_set:
        superhero_debate_contact_made: true
        superhero_relationship: 3
    is_end: true

  node_superhero_rejection:
    id: "node_superhero_rejection"
    type: character
    speaker_id: "f2a3b4c5-d6e7-8901-5678-012345678901"
    text: "I understand. The debate isn't for everyone."
    is_end: true
    effects:
      flag_set:
        superhero_debate_contact_made: true
        superhero_debate_rejected: true
        superhero_relationship: -3

