id: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
name: "Aisha Al-Sayed at Old Town Cafe"
description: "A conversation with Aisha Al-Sayed, an electrical engineer at Minera Estrella, about her career challenges and observations."
start_node_id: "start"
nodes:
  start:
    id: "start"
    type: "narrator"
    text: "As you enter the Old Town Cafe, you notice a woman sitting alone at a corner table, sipping her coffee while reviewing documents on a tablet. She looks up as you approach, her expression a mix of curiosity and wariness."
    thought: "She seems focused, yet there's a tension in her posture. Perhaps she's expecting someone, or maybe she's just cautious."
    choices:
      - id: "approach_aisha"
        text: "Approach Aisha"
        next_node_id: "aisha_greeting"
        time_block_cost:
          amount: 1
          description: "Approaching Aisha"
      - id: "observe_first"
        text: "Observe her for a moment"
        next_node_id: "observe_aisha"
        time_block_cost:
          amount: 1
          description: "Observing Aisha"

  observe_aisha:
    id: "observe_aisha"
    type: "narrator"
    text: "Aisha is dressed in professional attire, her dark hair neatly styled. She occasionally glances around the cafe, as if ensuring no one is listening. Her tablet displays what appears to be technical schematics, but she quickly switches to a different screen when she notices your gaze."
    thought: "She's definitely on edge. Maybe she's working on something sensitive, or perhaps she's just naturally cautious."
    choices:
      - id: "approach_aisha"
        text: "Approach her"
        next_node_id: "aisha_greeting"
        time_block_cost:
          amount: 1
          description: "Approaching Aisha"

  aisha_greeting:
    id: "aisha_greeting"
    type: "character"
    speaker_id: "c1000013-e29b-41d4-a716-446655440013"
    text: "Hello. I don't believe we've met. I'm Aisha Al-Sayed. And you are?"
    thought: "Her tone is polite but guarded. She's sizing me up, trying to figure out if I'm a threat or just another patron."
    choices:
      - id: "introduce_yourself"
        text: "I'm [Player Name]. Just stopping by for a coffee."
        next_node_id: "aisha_response"
        time_block_cost:
          amount: 1
          description: "Introducing yourself"
      - id: "ask_about_work"
        text: "I noticed you're reviewing some technical documents. Are you an engineer?"
        next_node_id: "aisha_work"
        time_block_cost:
          amount: 1
          description: "Asking about her work"

  aisha_response:
    id: "aisha_response"
    type: "character"
    speaker_id: "c1000013-e29b-41d4-a716-446655440013"
    text: "Ah, just a visitor. Well, this is a nice place to relax. I come here often to clear my head. The coffee is excellent, and the atmosphere is... refreshing."
    thought: "She's being careful with her words. Maybe she's not used to opening up to strangers."
    choices:
      - id: "ask_about_work"
        text: "What do you do for work?"
        next_node_id: "aisha_work"
        time_block_cost:
          amount: 1
          description: "Asking about her work"
      - id: "comment_on_cafe"
        text: "Yes, Marco does a great job with the coffee."
        next_node_id: "aisha_cafe_comment"
        time_block_cost:
          amount: 1
          description: "Commenting on the cafe"

  aisha_work:
    id: "aisha_work"
    type: "character"
    speaker_id: "c1000013-e29b-41d4-a716-446655440013"
    text: "I'm an electrical engineer at Minera Estrella. I oversee a team of engineers and technicians. It's challenging work, but I enjoy it."
    thought: "She's proud of her work, but there's a hint of frustration in her voice. Maybe she's facing some challenges at her job."
    choices:
      - id: "ask_about_challenges"
        text: "It sounds like there might be some challenges. Care to share?"
        next_node_id: "aisha_challenges"
        time_block_cost:
          amount: 1
          description: "Asking about challenges"
      - id: "ask_about_minera_estrella"
        text: "What's it like working at Minera Estrella?"
        next_node_id: "aisha_minera_estrella"
        time_block_cost:
          amount: 1
          description: "Asking about Minera Estrella"

  aisha_challenges:
    id: "aisha_challenges"
    type: "character"
    speaker_id: "c1000013-e29b-41d4-a716-446655440013"
    text: "Well, it's no secret that there's been a lot of change lately. The company has been bringing in more employees from China, and... let's just say that not everyone is happy about it. There are whispers about favoritism, but I try to focus on my work and not get caught up in office politics."
    thought: "She's being diplomatic, but it's clear that there's tension at her workplace. Maybe she's been personally affected by these changes."
    choices:
      - id: "ask_about_favoritism"
        text: "Have you experienced any favoritism yourself?"
        next_node_id: "aisha_favoritism"
        time_block_cost:
          amount: 1
          description: "Asking about favoritism"
      - id: "offer_support"
        text: "That sounds tough. If you ever need someone to talk to, I'm here."
        next_node_id: "aisha_support"
        time_block_cost:
          amount: 1
          description: "Offering support"

  aisha_favoritism:
    id: "aisha_favoritism"
    type: "character"
    speaker_id: "c1000013-e29b-41d4-a716-446655440013"
    text: "Let's just say that I've noticed certain patterns. Promotions seem to go to specific individuals, and it's not always based on merit. But I'm not one to complain. I believe in working hard and letting my results speak for themselves."
    thought: "She's clearly frustrated, but she's trying to stay professional. Maybe she's documented some of these patterns."
    choices:
      - id: "ask_about_documentation"
        text: "Have you documented any of these patterns?"
        next_node_id: "aisha_documentation"
        time_block_cost:
          amount: 1
          description: "Asking about documentation"
      - id: "ask_about_goals"
        text: "What are your goals at Minera Estrella?"
        next_node_id: "aisha_goals"
        time_block_cost:
          amount: 1
          description: "Asking about her goals"

  aisha_documentation:
    id: "aisha_documentation"
    type: "character"
    speaker_id: "c1000013-e29b-41d4-a716-446655440013"
    text: "I have kept some records, yes. It's always good to have documentation, just in case. But I'm not looking to cause trouble. I just want to ensure that my work is recognized and that I have a fair chance at advancement."
    thought: "She's being cautious, but it's clear that she's prepared. Maybe she's gathering evidence for a larger purpose."
    choices:
      - id: "offer_help"
        text: "If there's anything I can do to help, just let me know."
        next_node_id: "aisha_help"
        time_block_cost:
          amount: 1
          description: "Offering help"
      - id: "ask_about_goals"
        text: "What are your goals at Minera Estrella?"
        next_node_id: "aisha_goals"
        time_block_cost:
          amount: 1
          description: "Asking about her goals"

  aisha_goals:
    id: "aisha_goals"
    type: "character"
    speaker_id: "c1000013-e29b-41d4-a716-446655440013"
    text: "My goal is to advance within the company. I want to take on more responsibility and make a real impact. But I also want to ensure that the workplace is fair and that everyone has an equal opportunity to succeed."
    thought: "She's ambitious but also cares about fairness. It's a rare combination."
    choices:
      - id: "wish_luck"
        text: "I wish you the best of luck with your goals."
        next_node_id: "aisha_luck"
        time_block_cost:
          amount: 1
          description: "Wishing her luck"
      - id: "ask_about_personal_life"
        text: "What do you like to do outside of work?"
        next_node_id: "aisha_personal_life"
        time_block_cost:
          amount: 1
          description: "Asking about her personal life"

  aisha_luck:
    id: "aisha_luck"
    type: "character"
    speaker_id: "c1000013-e29b-41d4-a716-446655440013"
    text: "Thank you. I appreciate that. It's always nice to meet someone who understands the challenges of working in a competitive environment."
    thought: "She seems genuinely appreciative. Maybe she doesn't get much support at work."
    choices:
      - id: "end_conversation"
        text: "Take care, Aisha. It was nice meeting you."
        next_node_id: "farewell"
        time_block_cost:
          amount: 1
          description: "Ending the conversation"

  aisha_personal_life:
    id: "aisha_personal_life"
    type: "character"
    speaker_id: "c1000013-e29b-41d4-a716-446655440013"
    text: "Outside of work, I enjoy spending time with my husband. We live in a high-rise apartment near the financial district. I also like to attend professional development events and network with other engineers. It's important to stay connected and keep learning."
    thought: "She's dedicated to her career but also values her personal life. It's a good balance."
    choices:
      - id: "end_conversation"
        text: "That sounds like a good balance. Take care, Aisha."
        next_node_id: "farewell"
        time_block_cost:
          amount: 1
          description: "Ending the conversation"

  farewell:
    id: "farewell"
    type: "character"
    speaker_id: "c1000013-e29b-41d4-a716-446655440013"
    text: "It was nice meeting you, [Player Name]. If you're ever in the area again, feel free to stop by. I'm usually here in the afternoons."
    thought: "She's opening up a bit more. Maybe she's starting to trust me."
    is_end: true

