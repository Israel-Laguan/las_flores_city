id: "c52349cf-c576-4896-b18c-811af6869904"
name: "Valentina Reyes at University"
description: "A conversation with Valentina 'Val' Reyes, studying social work at Universidad del Valle. She's navigating her overwhelming transition to city life while maintaining dreams of helping others like her."
start_node_id: "val_intro"
scene_id: "73b5c820-e9ab-3f98-d2ee-e9599732e149"
character_id: "c51348ce-c575-4895-b17b-811af6869903"
nodes:
  val_intro:
    id: "val_intro"
    type: "narrator"
    text: "You spot a young woman sitting alone at a bench near the university courtyard, her dark hair tied back in a loose ponytail. She's clutching a notebook tightly, her posture a mix of attentiveness and nervous energy. Every now and then, she glances around as if still getting used to her surroundings."
    thought: "She looks out of place here—like a fish learning to swim in unfamiliar waters. Her casual clothes stand out among the more polished students."
    choices:
      - id: "approach_val"
        text: "Approach her"
        next_node_id: "val_greeting"
        time_block_cost:
          amount: 1
          description: "Approaching Val"
      - id: "observe_val"
        text: "Observe her for a moment"
        next_node_id: "observe_val"
        time_block_cost:
          amount: 1
          description: "Observing Val"

  observe_val:
    id: "observe_val"
    type: "narrator"
    text: "Val—she glances at a name tag on her backpack—appears to be reviewing lecture notes, mouthing words silently as she reads. She catches your gaze briefly and looks away quickly, a faint flush creeping across her sun-kissed cheeks."
    thought: "She notices she's being watched. Either she's very shy or very cautious. Maybe both."
    choices:
      - id: "approach_val"
        text: "Say hello"
        next_node_id: "val_greeting"
        time_block_cost:
          amount: 1
          description: "Approaching Val"

  val_greeting:
    id: "val_greeting"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "Oh—hello! I... I didn't see you there. Sorry, I'm still getting used to... this place."
    thought: "Her accent has a distinctive rural quality—definitely not from the city. She seems friendly but a bit flustered."
    choices:
      - id: "introduce_self"
        text: "I'm [Player Name]. New here myself."
        next_node_id: "val_relief"
        time_block_cost:
          amount: 1
          description: "Introducing yourself"
      - id: "ask_about_notebook"
        text: "I noticed your notebook—are you studying for a class?"
        next_node_id: "val_studying"
        time_block_cost:
          amount: 1
          description: "Asking about her studies"

  val_relief:
    id: "val_relief"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "Really? That's... that's actually a relief to hear. Sometimes I feel like everyone here knows exactly what they're doing except me. I'm Val. Valentina, but everyone calls me Val."
    thought: "She relaxes visibly, some of the tension leaving her shoulders. She's genuinely happy to meet someone else who's new."
    choices:
      - id: "ask_about_origin"
        text: "Where are you from, Val?"
        next_node_id: "val_origin"
        time_block_cost:
          amount: 1
          description: "Asking about her background"
      - id: "ask_about_notebook"
        text: "What are you studying?"
        next_node_id: "val_studying"
        time_block_cost:
          amount: 1
          description: "Asking about her studies"

  val_studying:
    id: "val_studying"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "Social work. I'm only in my first semester, so... everything is still pretty overwhelming. The vocabulary alone—I had to look up like ten words yesterday. *laughs nervously* My high school Spanish didn't quite prepare me for half the terms they use here."
    thought: "She smiles but there's vulnerability behind it. She's working hard to overcome the gaps in her education."
    choices:
      - id: "encourage_val"
        text: "That sounds really ambitious. Social work is important work."
        next_node_id: "val_motivation"
        time_block_cost:
          amount: 1
          description: "Encouraging Val"
      - id: "ask_about_motivation"
        text: "What made you want to become a social worker?"
        next_node_id: "val_motivation"
        time_block_cost:
          amount: 1
          description: "Asking about her motivation"

  val_motivation:
    id: "val_motivation"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "I want to help people who feel stuck between worlds, you know? People who don't fit neatly into either place. I grew up in a small town near the Río de las Flores—my dad is a fisherman there—and moving to Central City was... a lot."
    thought: "There's passion in her voice now, tempered by the weight of her own experiences. She's not just studying this—she's lived it."
    choices:
      - id: "ask_about_dad"
        text: "How's your dad doing with you being so far away?"
        next_node_id: "val_family"
        time_block_cost:
          amount: 1
          description: "Asking about her family"
      - id: "ask_about_challenges"
        text: "What has been the hardest part of the transition?"
        next_node_id: "val_challenges"
        time_block_cost:
          amount: 1
          description: "Asking about challenges"

  val_origin:
    id: "val_origin"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "Small town near the Río de las Flores. My dad works as a fisherman there—he's been trying to support us on his own since... well, that's complicated. I have an older brother who's already moved away, so it's just me and my dad now."
    thought: "Her expression softens when she talks about her dad, but there's a flicker of concern too. Family obligations weigh on her."
    choices:
      - id: "ask_about_dad"
        text: "It sounds like you and your dad are close."
        next_node_id: "val_family"
        time_block_cost:
          amount: 1
          description: "Asking about her father"
      - id: "ask_about_challenges"
        text: "Moving to the city must have been a big change."
        next_node_id: "val_challenges"
        time_block_cost:
          amount: 1
          description: "Asking about challenges"

  val_family:
    id: "val_family"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "We are—though it's complicated. My dad remarried recently, and he's trying to balance supporting me through school with his new family. I call my mom back home every week—she's still there, and we talk about everything. I miss her a lot."
    thought: "There's genuine warmth when she mentions her mom, and a hint of worry about her dad. The family dynamics are clearly strained but loving."
    choices:
      - id: "ask_about_calls"
        text: "What do you and your mom talk about?"
        next_node_id: "val_mom_calls"
        time_block_cost:
          amount: 1
          description: "Asking about her mother"
      - id: "ask_about_challenges"
        text: "How do you balance everything?"
        next_node_id: "val_challenges"
        time_block_cost:
          amount: 1
          description: "Asking about challenges"

  val_mom_calls:
    id: "val_mom_calls"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "Everything. My classes, my worries, the strange things people say here—like, apparently 'the coffee is on fleek' is a compliment? My mom laughs at that one. She tells me about home, about the river, about dad... we FaceTime every Sunday."
    thought: "She smiles genuinely now, the homesickness visible in her eyes. Her mom sounds like her anchor."
    choices:
      - id: "ask_about_challenges"
        text: "It sounds like you have a strong support system. What about here?"
        next_node_id: "val_challenges"
        time_block_cost:
          amount: 1
          description: "Asking about local challenges"
      - id: "offer_friendship"
        text: "If you ever want someone to study with or grab coffee, I'm here."
        next_node_id: "val_friendship"
        time_block_cost:
          amount: 1
          description: "Offering friendship"

  val_challenges:
    id: "val_challenges"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "Where do I start? The slang, the customs, the pace of everything... I feel like I'm learning a whole new language. In class, I sometimes don't understand the vocabulary, and I can tell it frustrates people when I ask questions."
    thought: "She looks down at her notebook, her grip tightening. This clearly weighs on her."
    choices:
      - id: "validate_struggles"
        text: "That's totally normal. The city has a learning curve."
        next_node_id: "val_inner_strength"
        time_block_cost:
          amount: 1
          description: "Validating her experience"
      - id: "ask_about_adaptation"
        text: "What helps you cope with it?"
        next_node_id: "val_inner_strength"
        time_block_cost:
          amount: 1
          description: "Asking about coping mechanisms"

  val_inner_strength:
    id: "val_inner_strength"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "I remind myself why I'm here. My dad works so hard to pay for my tuition—I can't waste this opportunity. And honestly? I want to make a difference. For people like me who feel lost between two worlds."
    thought: "Her resilience is evident. The struggle fuels her rather than defeats her."
    choices:
      - id: "admire_determination"
        text: "That's really admirable, Val."
        next_node_id: "val_determination"
        time_block_cost:
          amount: 1
          description: "Admiring her determination"
      - id: "ask_about_goals"
        text: "What do you hope to do after graduation?"
        next_node_id: "val_goals"
        time_block_cost:
          amount: 1
          description: "Asking about her goals"

  val_determination:
    id: "val_determination"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "Thank you. Sometimes I don't feel very strong—I call my parents crying after hard exams, questioning everything. But then I remember the people in my hometown who never got the chance to leave, and I know I have to try."
    thought: "She's vulnerable but determined. The weight of representing her community is real for her."
    choices:
      - id: "offer_encouragement"
        text: "You're doing something incredible. Don't forget that."
        next_node_id: "val_encouragement_response"
        time_block_cost:
          amount: 1
          description: "Offering encouragement"
      - id: "ask_about_goals"
        text: "What kind of social work do you want to do?"
        next_node_id: "val_goals"
        time_block_cost:
          amount: 1
          description: "Asking about her goals"

  val_goals:
    id: "val_goals"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "I want to work with immigrants or rural migrants—people transitioning between worlds, trying to find their place. I know how isolating it can feel. If I can be even one person's bridge to belonging, that would mean everything."
    thought: "Her eyes light up when she talks about her purpose. This is her calling, not just her career."
    choices:
      - id: "wish_luck"
        text: "I hope you achieve everything you're working toward, Val."
        next_node_id: "val_warm_farewell"
        time_block_cost:
          amount: 1
          description: "Wishing her luck"
      - id: "offer_support"
        text: "If there's ever anything I can help with, let me know."
        next_node_id: "val_friendship"
        time_block_cost:
          amount: 1
          description: "Offering support"

  val_encouragement_response:
    id: "val_encouragement_response"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "*takes a deep breath* Thank you. Really. It's easy to feel invisible here—like another face in the crowd. Having someone believe in you makes a difference."
    thought: "She's genuinely moved. She doesn't hear this often enough."
    choices:
      - id: "exchange_contact"
        text: "Would you like to exchange numbers? Maybe study together sometime?"
        next_node_id: "val_friendship"
        time_block_cost:
          amount: 1
          description: "Exchanging contact info"

  val_friendship:
    id: "val_friendship"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "I'd really like that. It's hard making friends when you feel like you don't belong. You're easy to talk to—that's rare around here."
    thought: "She smiles genuinely, some of her nervousness melting away."
    effects:
      flag_set:
        val_friendship_offered: true
    choices:
      - id: "close_conversation"
        text: "I'll see you around, Val. Good luck with everything."
        next_node_id: "val_warm_farewell"
        time_block_cost:
          amount: 1
          description: "Ending the conversation"

  val_warm_farewell:
    id: "val_warm_farewell"
    type: "character"
    speaker_id: "c51348ce-c575-4895-b17b-811af6869903"
    text: "Thanks, [Player Name]. Really. Today was... not as overwhelming as usual. I'll call my mom and tell her I met someone nice. *smiles* Take care—and welcome to the city, even if we're both still figuring it out."
    thought: "She seems genuinely happier than when you approached. A small win in a difficult transition."
    is_end: true

