history: >
  The Aeropuerto Internacional Las Flores began as a regional airfield serving the
  pre-constitutional provisional government in 2033 and was expanded in stages as
  the city formalised and its economy diversified. The decisive expansion came in
  2047, when LW Group's logistics division secured a forty-year concession for
  dedicated cargo terminal infrastructure — a deal that brought the capital for the
  airport's third runway, its expanded international terminal, and the automated
  cargo-processing wing that today handles the majority of mineral export volume
  leaving Las Flores by air. The concession structure effectively bifurcated the
  airport's identity from the outset: the public-facing international terminal
  handles commercial passenger traffic and tourism arrivals; the LW Group charter
  terminal in the airport's northern quadrant handles executive personnel, sensitive
  cargo, and the periodic international regulatory delegations whose visits to
  Las Flores are managed, in terms of schedule and access, by the company's government
  relations division. The 2052 Great Lithium Leak generated a significant increase
  in charter traffic through the northern terminal as LW Group crisis personnel
  arrived and as certain senior executives chose to depart during the period of
  maximum public scrutiny. The airport's expansion history is, in this respect,
  inseparable from the expansion history of LW Group's mineral export logistics:
  the airport grew because the company needed it to grow, and the public terminal
  was the political justification for the infrastructure the company actually required.

daytime: >
  The public terminal operates as a mid-sized international hub, handling roughly
  forty-two scheduled arrivals and departures daily alongside the charter operations
  that run through the northern concourse. Biometric gate systems at all passenger
  checkpoints process arrivals and departures against a shared registry maintained
  by the city's border authority and a secondary registry maintained by LW Group's
  security division under the concession agreement's data-sharing clause. The cargo
  processing wing runs on a separate operational schedule from passenger traffic,
  with autonomous loading vehicles moving between the southern freight apron and
  the warehouse complex in continuous cycles. Mixed cargo and passenger operations
  share the main runway schedule under an air traffic control system operated by
  the city aviation authority, though flight-slot priority rules embedded in the
  concession agreement give LW Group cargo operations precedence in defined windows
  that account for approximately thirty percent of daily runway time. Automated
  departure-board displays in the public terminal show passenger routes; the cargo
  manifests visible in the raw operational feed — including lithium shipment
  specifications and consignee data — are not surfaced in any public display.

nightlife: >
  After midnight the public terminal reduces to skeleton staffing, the check-in
  halls and retail concessions closed, the biometric gates in low-power monitoring
  mode. The LW Group charter terminal maintains full operational capability around
  the clock; its overnight activity is not visible from the public concourse. The
  cargo processing wing runs its busiest overnight cycle from 01:00 to 05:00,
  processing outbound mineral shipments timed for early-morning departure windows
  that align with Asian market opening hours. The main runway lights remain active
  throughout the night; from the city's northern elevated districts the amber
  approach-light sequence is visible as a persistent ground-level glow, an indicator
  that the city's extraction economy operates on a schedule that does not pause
  for civilian sleep cycles. Security drone coverage over the perimeter doubles
  between 23:00 and 06:00, the additional units deployed by the airport's
  security contractor — an LW Group subsidiary — under a protocol not included
  in the publicly accessible sections of the concession agreement.

important_places:
  - name: Public International Terminal
    description: >
      The main passenger-facing terminal handling forty-two scheduled routes daily.
      Biometric gates log arrivals and departures against dual registries: city border
      authority and LW Group security division. Retail concessions operate during
      passenger peak hours only.
  - name: LW Group Charter Terminal
    description: >
      A dedicated terminal in the airport's northern quadrant handling executive
      personnel, sensitive cargo, and regulatory delegations. Not accessible from
      the public concourse; operational twenty-four hours. Its activities are not
      included in the airport's public operational reporting.
  - name: Cargo Processing Wing
    description: >
      Autonomous cargo handling infrastructure in the southern freight complex,
      managing mineral export volume under the 2047 concession. Busiest operational
      period is overnight, timed for Asian market cargo windows. Manifest data
      is not surfaced in public displays.
  - name: Biometric Gate Array
    description: >
      Passenger checkpoint infrastructure using facial and iris recognition across
      all public terminal access points. Data is maintained in dual registries;
      the LW Group secondary registry's retention and use terms are embedded in
      the concession agreement rather than posted at the checkpoints.

conclusion: >
  The Aeropuerto Internacional Las Flores exists in the public imagination as a gateway
  to the city — the first and last infrastructure most international visitors encounter.
  Its actual function in the city's economy is more precisely a gateway for the commodity
  that has defined Las Flores's development trajectory: lithium, in processed form, leaving
  the Andean range on schedules calibrated to exchange markets the arrivals board does not
  display. The public terminal serves the city; the charter terminal and cargo wing serve
  the company that built them. The distinction is maintained in the concession architecture
  with enough care that the two functions share a runway without most passengers on
  the public concourse ever having reason to notice.
