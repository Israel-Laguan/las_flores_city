name: "Estación Central — Metro Platform"
description: "The main interchange platform of Estación Central, the hub where Líneas 1, 2, and 3 converge beneath the city's commercial district. Surveillance arrays line the platform ceiling at a density exceeding city average. Automated turnstiles track every entry and exit; the emergency broadcast screen at the platform end has not displayed an emergency message in eleven months."
