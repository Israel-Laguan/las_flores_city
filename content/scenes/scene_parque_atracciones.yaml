name: Parque de Atracciones — Midway
description: The central midway of the Parque de Atracciones Las Flores, where holographic ride-overlay projectors transform aging mechanical frames into immersive spectacle. Crowd noise, synthesized music, and the periodic thunderclap of a holographic sequence make quiet observation difficult. The park is engineered for immersion.
