name: Aeropuerto Internacional — Public Terminal
description: The public arrivals and departures concourse of the Aeropuerto Internacional Las Flores. Biometric gate arrays process the continuous flow of passengers; the holographic departures board cycles through routes and cargo notifications. The LW Group charter terminal is not visible from here but its access corridors branch from behind the service doors.
