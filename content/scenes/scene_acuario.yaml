name: Acuario Las Flores — Interior
description: The main gallery floor of the Acuario Las Flores, where holographic coral displays stretch across the dimly lit hall. The hum of filtration systems and the glow of bioluminescent tank installations create an atmosphere of engineered tranquility, distant from the contaminated delta outside.
