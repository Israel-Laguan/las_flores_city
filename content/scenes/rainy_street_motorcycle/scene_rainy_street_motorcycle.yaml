name: Rainy Street Motorcycle
description: Rain hammers down on the chrome and carbon fiber of a parked motorcycle, its underglow casting electric blue reflections on the wet asphalt. Neon signs from nearby noodle stalls and chop shops bleed crimson and amber puddles around the bike's kickstand, while the distant wail of sirens and the hiss of steam from underground grates create the city's endless soundtrack.
