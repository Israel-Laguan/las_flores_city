name: Secondary City Sunset
description: The setting sun bleeds through the perpetual smog, casting long shadows across the terraced fields where holographic advertisements flicker above rusting irrigation systems. Neon signs from corporate agribusiness compounds reflect in rain-slicked furrows, their artificial light competing with the dying amber glow on the wet earth. The distant hum of processing machinery harmonizes with cicadas and the whisper of data streams carried on the evening breeze.
