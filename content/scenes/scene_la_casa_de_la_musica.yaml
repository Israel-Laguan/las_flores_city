name: La Casa de la Música — Main Floor
description: The main performance floor of La Casa de la Música, where the holographic light rig hangs in standby configuration above the crowd. The converted textile warehouse's acoustic panels absorb and redirect sound with a precision that its improvised origins do not suggest. On a full evening the floor carries three hundred people and their collective thermal output.
