description: The classroom's windows stream rain-streaked neon from corporate billboards, casting electric shadows across desks wired with biometric scanners that track every keystroke. Holographic projectors flicker with corporate-curated lesson plans while the ventilation system hums with filtered air that can't quite mask the metallic tang of the city outside. Students in smart-uniforms tap augmented reality interfaces, their data feeds monitored by unseen algorithms that grade more than just test scores.
