    title: "Corrupted Data Drive"
    description: "A heavily encrypted USB drive left by Evelyn Ruthenberg. The casing is cracked. It bears the insignia of the Li Wei Group. Contains Liu Fang's evidence."
    thumbnail_url: "https://cdn.lasflores2077.com/clues/thumb_clue_usb_drive.png"
