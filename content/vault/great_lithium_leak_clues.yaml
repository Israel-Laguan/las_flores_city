  - id: "b0000000-e29b-41d4-a716-446655440002"
    title: "Internal Safety Report — Container Facility (2048)"
    description: "An internal report from Minera Estrella's safety inspectors documenting visible corrosion in high-pressure pipes and recommending immediate replacement. The report was never acted upon."
    thumbnail_url: "https://cdn.lasflores2077.com/clues/thumb_safety_report.png"
    media_path: "/clues/clue_safety_report.jpg"
    item_type: "clue"
    mission_id: "a0000000-e29b-41d4-a716-446655440001"

  - id: "b0000000-e29b-41d4-a716-446655440003"
    title: "Email Chain: Zhang Liang Delays Containment Upgrade"
    description: "Emails between Zhang Liang and the procurement department showing deliberate budget cuts that blocked Qiu Bo's proposed containment system upgrade in 2049."
    thumbnail_url: "https://cdn.lasflores2077.com/clues/thumb_email_chain.png"
    media_path: "/clues/clue_email_chain.png"
    item_type: "clue"
    mission_id: "a0000000-e29b-41d4-a716-446655440001"

  - id: "b0000000-e29b-41d4-a716-446655440004"
    title: "Li Wei Emergency Meeting Transcript (Aug 18, 2052)"
    description: "Transcript of the emergency meeting where Li Wei was briefed on the lithium leak. Elena Torres confirms catastrophic contamination. Li Wei orders a cover-up strategy."
    thumbnail_url: "https://cdn.lasflores2077.com/clues/thumb_meeting_transcript.png"
    media_path: "/clues/clue_transcript.pdf"
    item_type: "clue"
    mission_id: "a0000000-e29b-41d4-a716-446655440001"

  - id: "b0000000-e29b-41d4-a716-446655440005"
    title: "Financial Records — Bribes to City Officials"
    description: "Bank records showing suspicious payments from Minera Estrella to councilman Emilio Reyes and other officials, routed through shell companies."
    thumbnail_url: "https://cdn.lasflores2077.com/clues/thumb_bank_records.png"
    media_path: "/clues/clue_bank_records.csv"
    item_type: "clue"
    mission_id: "a0000000-e29b-41d4-a716-446655440001"

  - id: "b0000000-e29b-41d4-a716-446655440006"
    title: "Security Footage Metadata — Aug 15, 2052"
    description: "Camera logs from the container facility showing the exact moment of the pipe explosion. No rain visible on any external cameras. Corroborates Liu Fang's footage."
    thumbnail_url: "https://cdn.lasflores2077.com/clues/thumb_security_logs.png"
    media_path: "/clues/clue_security_logs.txt"
    item_type: "clue"
    mission_id: "a0000000-e29b-41d4-a716-446655440001"

  - id: "b0000000-e29b-41d4-a716-446655440007"
    title: "Cecilia Perez Audit Report (Original, Unsuppressed)"
    description: "The original audit report by Cecilia Perez documenting structural problems with the container facility. Shows her recommendations were redacted from the official version."
    thumbnail_url: "https://cdn.lasflores2077.com/clues/thumb_audit_report.png"
    media_path: "/clues/clue_audit_report.pdf"
    item_type: "clue"
    mission_id: "a0000000-e29b-41d4-a716-446655440001"

  - id: "b0000000-e29b-41d4-a716-446655440008"
    title: "New Container Facility Blueprints (2055)"
    description: "Blueprints for the replacement container facility built in 2055. Annotated by technicians noting that the new design was forced by the imminent failure of the original pipes."
    thumbnail_url: "https://cdn.lasflores2077.com/clues/thumb_blueprints.png"
    media_path: "/clues/clue_blueprints.png"
    item_type: "clue"
    mission_id: "a0000000-e29b-41d4-a716-446655440001"

  - id: "b0000000-e29b-41d4-a716-446655440009"
    title: "Liu Fang's Personal Notebook Excerpts"
    description: "Handwritten notes from Liu Fang detailing her investigation into the cover-up, including names of those involved and a warning that she was being followed."
    thumbnail_url: "https://cdn.lasflores2077.com/clues/thumb_notebook.png"
    media_path: "/clues/clue_notebook.jpg"
    item_type: "clue"
    mission_id: "a0000000-e29b-41d4-a716-446655440001"

  - id: "b0000000-e29b-41d4-a716-446655440010"
    title: "Minera Estrella Cover-Up Memo"
    description: "Internal memo outlining the staged electrical failure narrative, including the plan to create a controlled explosion and blame it on storm-related power surges."
    thumbnail_url: "https://cdn.lasflores2077.com/clues/thumb_memo.png"
    media_path: "/clues/clue_memo.pdf"
