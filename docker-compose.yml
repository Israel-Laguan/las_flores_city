services:
  # PostgreSQL - OLTP (Main Game State)
  postgres-oltp:
    image: postgres:16-alpine
    container_name: las-flores-postgres-oltp
    restart: unless-stopped
    environment:
      POSTGRES_DB: las_flores
      POSTGRES_USER: las_flores
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-las_flores_dev_password}
    # Production: Remove port mapping, use internal network only
    ports:
      - "5434:5432"
    volumes:
      - postgres-oltp-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U las_flores"]
      interval: 10s
      timeout: 5s
      retries: 5

  # PostgreSQL - OLAP (Analytics & Leaderboards)
  postgres-olap:
    image: postgres:16-alpine
    container_name: las-flores-postgres-olap
    restart: unless-stopped
    environment:
      POSTGRES_DB: las_flores_analytics
      POSTGRES_USER: las_flores_analytics
      POSTGRES_PASSWORD: ${POSTGRES_ANALYTICS_PASSWORD:-las_flores_analytics_dev_password}
    # Production: Remove port mapping, use internal network only
    ports:
      - "5433:5432"
    volumes:
      - postgres-olap-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U las_flores_analytics"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis - Versioned Content Cache
  redis:
    image: redis:7-alpine
    container_name: las-flores-redis
    restart: unless-stopped
    # Production: Remove port mapping, use internal network only
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # MinIO - S3-compatible Object Storage (for Signed URLs)
  minio:
    image: minio/minio:latest
    container_name: las-flores-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin}
    # Production: Only expose console (9001), remove API (9000) from public access
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  # LiteLLM Proxy - Unified LLM API Gateway
  # NOTE 2026-07-21: LiteLLM MUST run on the HOST, not in a container, because
  # container DNS resolution fails in Podman rootless without aardvark-dns.
  # The server container connects to host.containers.internal:4000.
  # To use: Start litellm on host with: litellm --config ~/litellm_config/config.yaml --port 4000 &
  # Then set server env: LITELLM_BASE_URL=http://host.containers.internal:4000
  # (The litellm service below is kept for reference but should NOT be used)
  litellm:
    image: ghcr.io/berriai/litellm:main-latest
    container_name: las-flores-litellm
    profiles: ["disabled"]  # LiteLLM runs on HOST, not in container (see comment above)
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - ./litellm-config.yaml:/app/config.yaml:ro
    environment:
      LITELLM_MASTER_KEY: ${LITELLM_MASTER_KEY:-local-key}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:4000/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    # No depends_on - LiteLLM doesn't need other services to start

  # Server - Node.js/Express API
  server:
    build:
      context: .
      dockerfile: server/Dockerfile
    container_name: las-flores-server
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://las_flores:${POSTGRES_PASSWORD:-las_flores_dev_password}@postgres-oltp:5432/las_flores
      ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:${POSTGRES_ANALYTICS_PASSWORD:-las_flores_analytics_dev_password}@postgres-olap:5432/las_flores_analytics
      REDIS_URL: redis://redis:6379
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin}
      JWT_SECRET: ${JWT_SECRET:-your-jwt-secret-change-in-production}
      # Production: Use external secrets/config, no defaults
      CDN_BASE_URL: ${CDN_BASE_URL}
      CDN_KEY_PAIR_ID: ${CDN_KEY_PAIR_ID}
      CDN_PRIVATE_KEY_PATH: ${CDN_PRIVATE_KEY_PATH}
      SIGNED_URL_TTL_SECONDS: ${SIGNED_URL_TTL_SECONDS:-900}

      # Patreon Integration - use external secrets in production
      PATREON_CLIENT_ID: ${PATREON_CLIENT_ID}
      PATREON_CLIENT_SECRET: ${PATREON_CLIENT_SECRET}
      PATREON_REDIRECT_URI: ${PATREON_REDIRECT_URI:-http://localhost:3000/patreon/callback}
      PATREON_NSFW_TIER_IDS: ${PATREON_NSFW_TIER_IDS:-}
      CLIENT_BASE_URL: ${CLIENT_BASE_URL:-http://localhost:5173}

      # Integración de PayPal
      PAYPAL_MODE: ${PAYPAL_MODE:-sandbox}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID}
      PAYPAL_SECRET: ${PAYPAL_SECRET}
      PAYPAL_WEBHOOK_ID: ${PAYPAL_WEBHOOK_ID:-}
      GOLD_CREDITS_PER_USD: ${GOLD_CREDITS_PER_USD:-100}

      # LiteLLM Proxy Configuration
      # 2026-07-21: Use host.containers.internal:4000 (LiteLLM runs on HOST, not container)
      # Original http://litellm:4000 won't resolve without aardvark-dns
      LITELLM_BASE_URL: http://host.containers.internal:4000
      LITELLM_API_KEY: ${LITELLM_API_KEY:-local-key}
      LLM_MODEL: ${LLM_MODEL:-poolside/laguna-m.1}
      LLM_PROVIDER: litellm  # 2026-07-21: Explicitly set to use real LLM (default is mock)

    depends_on:
      postgres-oltp:
        condition: service_healthy
      postgres-olap:
        condition: service_healthy
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.containers.internal:host-gateway"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      # Development: reduce start_period for faster feedback
      start_period: ${DEV_MODE:-20}s
    volumes:
      # Production: Remove volume mounts for source code
      - ./server/src:/app/server/src
      - ./shared:/app/shared
      - ./content:/app/content
      - ./docs:/app/docs:ro

  # Playwright E2E
  playwright:
    build:
      context: .
      dockerfile: client/Dockerfile.e2e
    container_name: las-flores-playwright
    depends_on:
      server:
        condition: service_healthy
    environment:
      API_URL: http://server:3000
    volumes:
      - ./client:/app/client
      - ./shared:/app/shared
      - /app/client/node_modules
    working_dir: /app/client
    command: npx playwright test --config playwright.docker.config.ts

  # Admin Panel - Next.js 16 (new, direct-fetch to Express)
  admin:
    build:
      context: .
      dockerfile: admin/Dockerfile
    container_name: las-flores-admin
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      NEXT_PUBLIC_SERVER_URL: http://server:3000
    depends_on:
      server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
    volumes:
      - ./admin/src:/app/admin/src
      - ./shared:/app/shared

volumes:
  postgres-oltp-data:
  postgres-olap-data:
  redis-data:
  minio-data:
