# Terrain Tile Registry
# Seamless top-down textures for the isometric map grid
# `walkable` marks whether the player/NPC can stand on this tile type
# (shared by the web map nav and the Phaser LocationScene navmesh).

tiles:
  - id: tile_street
    name: "Street"
    description: "Urban asphalt street with subtle wear, tire marks, and faded lane markings"
    colors: "dark gray asphalt, faded white lines, oil sheen rainbows"
    seamless: true
    walkable: true
    minio_path: "las-flores/tiles/tile_street.png"

  - id: tile_beach_sand
    name: "Beach Sand"
    description: "Golden sand with fine grain texture, scattered seashells, footprints"
    colors: "warm golden beige, pale seashell whites, wet sand darker tan"
    seamless: true
    walkable: true
    minio_path: "las-flores/tiles/tile_beach_sand.png"

  - id: tile_water_ocean
    name: "Ocean Water"
    description: "Deep ocean water with gentle wave patterns, foam crests, light refraction"
    colors: "deep teal blue, turquoise highlights, white foam"
    seamless: true
    walkable: false
    minio_path: "las-flores/tiles/tile_water_ocean.png"

  - id: tile_water_river
    name: "River Water"
    description: "Shallow river with visible current, smooth stones beneath surface, ripples"
