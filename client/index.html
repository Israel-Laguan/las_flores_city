<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Las Flores 2077</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background-color: #0a0a1a;
        overflow: hidden;
        font-family: monospace;
      }
      
      #game-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      #phone-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        pointer-events: none;
        z-index: 1000;
      }
      
      #dialogue-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: none;
        justify-content: center;
        align-items: center;
        background: rgba(0, 0, 0, 0.85);
        z-index: 2000;
        font-family: monospace;
      }
      
      #monologue-feed {
        position: fixed;
        bottom: 20px;
        left: 20px;
        width: 350px;
        max-height: 200px;
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(0, 255, 0, 0.3);
        border-radius: 8px;
        padding: 15px;
        font-family: monospace;
        z-index: 1500;
        overflow: hidden;
      }
      
      #status-bar {
        position: fixed;
        top: 10px;
        left: 10px;
        display: flex;
        gap: 20px;
        padding: 10px 15px;
        background: rgba(0, 0, 0, 0.8);
        border: 1px solid rgba(0, 255, 0, 0.3);
        border-radius: 5px;
        font-family: monospace;
        font-size: 12px;
        color: #00ff00;
        z-index: 1500;
      }
      
      #status-bar .stat {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      
      #status-bar .stat-label {
        color: #888;
      }
      
      #status-bar .stat-value {
        color: #00ff00;
        font-weight: bold;
      }
    </style>
  </head>
  <body>
    <div id="status-bar">
      <div class="stat">
        <span class="stat-label">TB:</span>
        <span class="stat-value" id="tb-display">48/48</span>
      </div>
      <div class="stat">
        <span class="stat-label">Credits:</span>
        <span class="stat-value" id="credits-display">100</span>
      </div>
      <div class="stat">
        <span class="stat-label">Location:</span>
        <span class="stat-value" id="location-display">Apartment</span>
      </div>
    </div>
    
    <div id="game-container"></div>
    <div id="phone-overlay"></div>
    <div id="dialogue-overlay"></div>
    <div id="monologue-feed"></div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
