<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Las Flores 2077</title>
    <link rel="stylesheet" href="/src/styles/phone.css" />
    <link rel="stylesheet" href="/src/styles/glitch.css" />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        background-color: var(--color-page-bg, #0a0a1a);
        overflow: hidden;
        font-family: monospace;
      }
      
      #game-container {
        width: 100vw;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }
      
      /* #phone-overlay is the phone-os-container; styles live in phone.css */
      
      #status-bar {
        position: fixed;
        top: 10px;
        left: 10px;
        display: flex;
        gap: 20px;
        padding: 10px 15px;
        background: var(--status-bar-bg);
        border: 1px solid var(--status-bar-border);
        border-radius: 5px;
        font-family: monospace;
        font-size: 12px;
        color: var(--status-bar-text);
        z-index: 1500;
      }
      
      #status-bar .stat {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      
      #status-bar .stat-label {
        color: var(--status-bar-accent);
      }
      
      #status-bar .stat-value {
        color: var(--status-bar-text);
        font-weight: bold;
      }
      
      #monologue-feed {
        position: fixed;
        bottom: 16px;
        left: 16px;
        width: 380px;
        max-height: 260px;
        background: var(--color-bg);
        border: 1px solid var(--neon-blue);
        border-radius: 4px;
        font-family: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;
        font-size: 11px;
        z-index: 1500;
        overflow: hidden;
        contain: content;
        backdrop-filter: blur(6px);
      }
    </style>
  </head>
  <body>
    <div id="status-bar">
      <div class="stat">
        <span class="stat-label">TB:</span>
        <span class="stat-value" id="tb-display">48/48</span>
      </div>
      <div class="stat">
        <span class="stat-label">Credits:</span>
        <span class="stat-value" id="credits-display">100</span>
      </div>
      <div class="stat">
        <span class="stat-label">Location:</span>
        <span class="stat-value" id="location-display">Apartment</span>
      </div>
    </div>
    
    <div id="login-menu"></div>
    <div id="view-container"></div>
    <div id="game-container"></div>
    <div id="phone-overlay" class="phone-os-container">
      <div class="phone-bezel">
        <div class="phone-screen">
          <header id="phone-status-bar" class="status-bar"></header>
          <main id="phone-app-content" class="app-viewport"></main>
          <footer id="phone-nav-bar" class="nav-bar"></footer>
        </div>
      </div>
    </div>
    <div id="dialogue-overlay"></div>
    <div id="monologue-feed"></div>
    
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
