name: Sprint 2 — The Loop Validation

on:
  push:
    branches: [main, develop, sprint-2]
  pull_request:
    branches: [main, develop]

# ── Shared service block (YAML anchor) ───────────────────────────────────────
# GitHub Actions does not support YAML anchors in workflow files, so services
# are repeated per job below.

jobs:
  # ── Backend Integration ────────────────────────────────────────────────────
  integration:
    name: Integration Tests — Banking, Gigs, Comms, Feed, OLAP
    runs-on: ubuntu-latest

    services:
      postgres-oltp:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores
          POSTGRES_USER: las_flores
          POSTGRES_PASSWORD: las_flores_dev_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-olap:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores_analytics
          POSTGRES_USER: las_flores_analytics
          POSTGRES_PASSWORD: las_flores_analytics_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=shared

      - name: Apply OLTP schema
        run: |
          for migration in \
            001_initial_schema \
            003_sprint1_schema \
            004_scene_payload \
            005_dialogue_service \
            006_add_move_event_type \
            007_sleep_reset_schema \
            008_add_sleep_event_type \
            009_add_user_relationships \
            010_sprint2_readiness \
            011_bank_constraints \
            012_gigs_schema \
            014_social_feed \
            015_player_sms_threads_v2 \
            016_add_sms_event_types; do
            PGPASSWORD=las_flores_dev_password psql \
              -h localhost -p 5434 -U las_flores -d las_flores \
              -f server/src/database/migrations/${migration}.sql
          done

      - name: Apply OLAP schema
        run: |
          PGPASSWORD=las_flores_analytics_dev_password psql \
            -h localhost -p 5433 -U las_flores_analytics -d las_flores_analytics \
            -f server/src/database/migrations/002_analytics_schema.sql
          PGPASSWORD=las_flores_analytics_dev_password psql \
            -h localhost -p 5433 -U las_flores_analytics -d las_flores_analytics \
            -f server/src/database/migrations/013_add_gig_event_type.sql

      - name: Run content migration
        run: npm run migrate --workspace=server -- ../content
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

      - name: 2.1 — Bank ledger & DB constraint tests
        run: npm run test:integration --workspace=server -- --testPathPattern=sprint2.validation
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

      - name: 2.3 — Gig engine tests (atomic TB deduction + OLAP telemetry)
        run: npm run test:integration --workspace=server -- --testPathPattern=gigs
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

      - name: 2.4 — OLAP write non-blocking tests
        run: npm run test:integration --workspace=server -- --testPathPattern=olap-write
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

      - name: Full integration suite (regression guard)
        run: npm run test:integration --workspace=server
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

  # ── E2E Browser Tests ──────────────────────────────────────────────────────
  e2e:
    name: E2E Tests — Phone OS Shell & App Router
    runs-on: ubuntu-latest
    needs: integration

    services:
      postgres-oltp:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores
          POSTGRES_USER: las_flores
          POSTGRES_PASSWORD: las_flores_dev_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-olap:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores_analytics
          POSTGRES_USER: las_flores_analytics
          POSTGRES_PASSWORD: las_flores_analytics_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=shared

      - name: Apply schemas & seed content
        run: |
          for migration in \
            001_initial_schema \
            003_sprint1_schema \
            004_scene_payload \
            005_dialogue_service \
            006_add_move_event_type \
            007_sleep_reset_schema \
            008_add_sleep_event_type \
            009_add_user_relationships \
            010_sprint2_readiness \
            011_bank_constraints \
            012_gigs_schema \
            014_social_feed \
            015_player_sms_threads_v2 \
            016_add_sms_event_types; do
            PGPASSWORD=las_flores_dev_password psql \
              -h localhost -p 5434 -U las_flores -d las_flores \
              -f server/src/database/migrations/${migration}.sql
          done
          PGPASSWORD=las_flores_analytics_dev_password psql \
            -h localhost -p 5433 -U las_flores_analytics -d las_flores_analytics \
            -f server/src/database/migrations/002_analytics_schema.sql
          PGPASSWORD=las_flores_analytics_dev_password psql \
            -h localhost -p 5433 -U las_flores_analytics -d las_flores_analytics \
            -f server/src/database/migrations/013_add_gig_event_type.sql
          npm run migrate --workspace=server -- ../content
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

      - name: Start API server (background)
        run: npm run start --workspace=server &
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379
          PORT: 3000

      - name: Wait for API server
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/health && break
            sleep 2
          done

      - name: Build client
        run: npm run build --workspace=client
        env:
          VITE_API_URL: http://localhost:3000

      - name: Start client (background)
        run: npx --yes serve -s dist -l 5173 &
        working-directory: client

      - name: Wait for client
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173 && break
            sleep 2
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: client

      - name: 2.1 — Sprint 2 Phone OS E2E tests
        run: npx playwright test tests/e2e/sprint2.phone.e2e.test.ts
        working-directory: client
        env:
          API_URL: http://localhost:3000

      - name: Full E2E suite (regression guard)
        run: npx playwright test
        working-directory: client
        env:
          API_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: sprint2-playwright-report
          path: client/playwright-report/
          retention-days: 7
