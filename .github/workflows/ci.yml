name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres-oltp:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores
          POSTGRES_USER: las_flores
          POSTGRES_PASSWORD: las_flores_dev_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-olap:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores_analytics
          POSTGRES_USER: las_flores_analytics
          POSTGRES_PASSWORD: las_flores_analytics_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=shared

      - name: Apply OLTP schema
        run: |
          for migration in \
            001_initial_schema \
            003_player_state_schema \
            004_scene_payload \
            005_dialogue_service \
            007_sleep_reset_schema \
            009_add_user_relationships \
            010_metadata_readiness \
            011_bank_constraints \
            012_gigs_schema \
            014_social_feed \
            015_player_sms_threads_v2 \
            017_mystery_state \
            018_vault_system \
            021_leaderboards \
            022_ai_settings \
            023_patreon_entitlements \
            024_marketplace \
            026_vault_signed_urls \
            027_aftermath \
            028_metaplot_alignment \
            029_player_state_decoupling \
            030_dialogue_chunks \
            031_allow_player_state_credit_overdraft \
            032_dialogue_chunk_tracking; do
            PGPASSWORD=las_flores_dev_password psql \
              -h localhost -p 5434 -U las_flores -d las_flores \
              -f server/src/database/migrations/${migration}.sql
          done

      - name: Apply OLAP schema
        run: |
          for migration in \
            002_analytics_schema \
            006_add_move_event_type \
            008_add_sleep_event_type \
            013_add_gig_event_type \
            016_add_sms_event_types \
            019_add_vault_event_type \
            020_add_mystery_solved_event_type \
            025_marketplace_olap; do
            PGPASSWORD=las_flores_analytics_dev_password psql \
              -h localhost -p 5433 -U las_flores_analytics -d las_flores_analytics \
              -f server/src/database/migrations/${migration}.sql
          done

      - name: Run content migration
        run: npm run migrate --workspace=server -- ../content
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

      - name: Run server tests
        run: npm run test:server
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

      - name: Run linter
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=shared

      - name: Build server
        run: npm run build --workspace=server

      - name: Build client
        run: npm run build --workspace=client

      - name: Build admin
        run: npm run build --workspace=admin
