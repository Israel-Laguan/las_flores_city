name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres-oltp:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores
          POSTGRES_USER: las_flores
          POSTGRES_PASSWORD: las_flores_dev_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-olap:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores_analytics
          POSTGRES_USER: las_flores_analytics
          POSTGRES_PASSWORD: las_flores_analytics_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=shared

      - name: Apply OLTP schema
        run: |
          set -euo pipefail
          jq -r '.oltp[]' server/src/database/migrations/migration-targets.json | while read migration; do
            PGPASSWORD=las_flores_dev_password psql -v ON_ERROR_STOP=1 \
              -h localhost -p 5434 -U las_flores -d las_flores \
              -f "server/src/database/migrations/${migration}"
          done

      - name: Apply OLAP schema
        run: |
          set -euo pipefail
          jq -r '.olap[]' server/src/database/migrations/migration-targets.json | while read migration; do
            PGPASSWORD=las_flores_analytics_dev_password psql -v ON_ERROR_STOP=1 \
              -h localhost -p 5433 -U las_flores_analytics -d las_flores_analytics \
              -f "server/src/database/migrations/${migration}"
          done

      - name: Run content migration
        run: npm run migrate --workspace=server -- ../content
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

      - name: Run server tests
        run: npm run test:server
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379
          CDN_BASE_URL: https://cdn.lasflores2077.com
          CDN_KEY_PAIR_ID: APKADEV00000000000000
          CDN_PRIVATE_KEY_PATH: /nonexistent/key-for-test.pem

      - name: Run linter
        run: npm run lint

  build:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=shared

      - name: Build server
        run: npm run build --workspace=server

      - name: Build client
        run: npm run build --workspace=client

      - name: Build admin
        run: npm run build --workspace=admin
