name: E2E Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest

    services:
      postgres-oltp:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores
          POSTGRES_USER: las_flores
          POSTGRES_PASSWORD: las_flores_dev_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-olap:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores_analytics
          POSTGRES_USER: las_flores_analytics
          POSTGRES_PASSWORD: las_flores_analytics_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=shared

      - name: Apply all migrations & seed content
