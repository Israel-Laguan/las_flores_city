name: E2E Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest

    services:
      postgres-oltp:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores
          POSTGRES_USER: las_flores
          POSTGRES_PASSWORD: las_flores_dev_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-olap:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores_analytics
          POSTGRES_USER: las_flores_analytics
          POSTGRES_PASSWORD: las_flores_analytics_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=shared

      - name: Apply all migrations & seed content
        run: |
          for migration in \
            001_initial_schema \
            003_player_state_schema \
            004_scene_payload \
            005_dialogue_service \
            007_sleep_reset_schema \
            009_add_user_relationships \
            010_metadata_readiness \
            011_bank_constraints \
            012_gigs_schema \
            014_social_feed \
            015_player_sms_threads_v2; do
            PGPASSWORD=las_flores_dev_password psql \
              -h localhost -p 5434 -U las_flores -d las_flores \
              -f server/src/database/migrations/${migration}.sql
          done
          for migration in \
            002_analytics_schema \
            006_add_move_event_type \
            008_add_sleep_event_type \
            013_add_gig_event_type \
            016_add_sms_event_types; do
            PGPASSWORD=las_flores_analytics_dev_password psql \
              -h localhost -p 5433 -U las_flores_analytics -d las_flores_analytics \
              -f server/src/database/migrations/${migration}.sql
          done
          npm run migrate --workspace=server -- ../content
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

      - name: Start API server (background)
        run: npm run start --workspace=server &
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379
          PORT: 3000

      - name: Wait for API server
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:3000/health && break
            sleep 2
          done

      - name: Build client
        run: npm run build --workspace=client
        env:
          VITE_API_URL: http://localhost:3000

      - name: Start client (background)
        run: npx --yes serve -s dist -l 5173 &
        working-directory: client

      - name: Wait for client
        run: |
          for i in $(seq 1 20); do
            curl -sf http://localhost:5173 && break
            sleep 2
          done

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: client

      - name: E2E tests
        run: npx playwright test
        working-directory: client
        env:
          API_URL: http://localhost:3000

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
