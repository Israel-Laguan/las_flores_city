name: E2E Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  e2e:
    name: E2E — Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 60

    services:
      postgres-oltp:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores
          POSTGRES_USER: las_flores
          POSTGRES_PASSWORD: las_flores_dev_password
        ports:
          - 5434:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      postgres-olap:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: las_flores_analytics
          POSTGRES_USER: las_flores_analytics
          POSTGRES_PASSWORD: las_flores_analytics_dev_password
        ports:
          - 5433:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared types
        run: npm run build --workspace=shared

      - name: Apply all migrations & seed content
        run: npm run schema:migrate --workspace=server
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379

      - name: Build server
        run: npm run build --workspace=server

      - name: Start API server (background)
        run: npm run start --workspace=server > /tmp/server.log 2>&1 &
        env:
          DATABASE_URL: postgresql://las_flores:las_flores_dev_password@localhost:5434/las_flores
          ANALYTICS_DATABASE_URL: postgresql://las_flores_analytics:las_flores_analytics_dev_password@localhost:5433/las_flores_analytics
          REDIS_URL: redis://localhost:6379
          PORT: 3000
          CLIENT_ORIGIN_URL: http://localhost:5173
          NODE_ENV: development

      - name: Wait for API server
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:3000/health > /dev/null 2>&1; then
              echo "API server is ready"
              exit 0
            fi
            sleep 2
          done
          echo "::error::API server failed to start within 60 seconds"
          cat /tmp/server.log 2>/dev/null || true
          exit 1

      - name: Build client (types only, skip Vite build — dev server proxies)
        run: npx tsc --noEmit
        working-directory: client

      - name: Start Vite dev server (background)
        run: npm run dev > /tmp/client.log 2>&1 &
        working-directory: client
        env:
          VITE_API_PROXY_TARGET: http://localhost:3000
          VITE_ABOUT_US_URL: https://example.com/about-us

      - name: Wait for client
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:5173 > /dev/null 2>&1; then
              echo "Client is ready"
              exit 0
            fi
            sleep 2
          done
          echo "::error::Client failed to start within 60 seconds"
          cat /tmp/client.log 2>/dev/null || true
          exit 1

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: client

      - name: E2E tests
        run: npx playwright test
        working-directory: client
        env:
          CI: 'true'
          API_URL: http://localhost:5173
          CLIENT_ORIGIN_URL: http://localhost:5173

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 7
